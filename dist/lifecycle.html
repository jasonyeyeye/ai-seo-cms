<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生命周期管理 - 管理后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-100">
  <div class="flex min-h-screen" x-data="lifecycleManager">
    {{ include('partials/admin-sidebar') }}

    <main class="flex-1 p-8">
      <div class="max-w-7xl mx-auto">
        <div class="flex items-center justify-between mb-8">
          <div>
            <h1 class="text-3xl font-bold text-gray-900">🔄 生命周期管理</h1>
            <p class="text-gray-500 mt-1">配置文章生命周期阶段自动操作</p>
          </div>
          <div class="flex items-center space-x-3">
            <button @click="loadData" class="px-4 py-2 bg-gray-100 rounded-lg hover:bg-gray-200 transition">🔄 刷新</button>
            <button @click="runEvaluation" :disabled="running" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition disabled:opacity-50">
              <span x-show="!running">⚡ 运行评估</span>
              <span x-show="running">运行中...</span>
            </button>
          </div>
        </div>

        <!-- Lifecycle Stages Overview -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
          <template x-for="stage in ['hot', 'warm', 'cold', 'archive']" :key="stage">
            <div class="bg-white rounded-xl shadow-sm p-6">
              <div class="flex items-center justify-between mb-2">
                <div class="text-2xl" x-text="stageEmoji(stage)"></div>
                <span class="text-xs px-2 py-1 rounded" :class="getConfig(stage)?.enabled ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-600'" x-text="getConfig(stage)?.enabled ? '自动' : '手动'"></span>
              </div>
              <div class="text-lg font-bold text-gray-900 capitalize" x-text="stageLabel(stage)"></div>
              <div class="text-sm text-gray-500 mt-1" x-text="getActionLabel(getConfig(stage)?.autoAction)"></div>
              <div class="mt-3 flex space-x-2">
                <button @click="editConfig(stage)" class="flex-1 px-3 py-1 text-xs bg-blue-100 text-blue-700 rounded hover:bg-blue-200">配置</button>
              </div>
            </div>
          </template>
        </div>

        <!-- Posts by Lifecycle Stage -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
          <div class="bg-white rounded-xl shadow-sm p-6">
            <h2 class="text-lg font-semibold mb-4 flex items-center">
              <span class="mr-2">🔥</span> Hot 文章
              <span class="ml-2 px-2 py-0.5 bg-red-100 text-red-800 rounded-full text-xs" x-text="postsByStage.hot?.length || 0"></span>
            </h2>
            <div class="space-y-2 max-h-60 overflow-y-auto">
              <template x-for="post in postsByStage.hot" :key="post.id">
                <div class="flex items-center justify-between py-2 px-3 bg-gray-50 rounded">
                  <div>
                    <div class="font-medium text-sm" x-text="post.title"></div>
                    <div class="text-xs text-gray-500" x-text="post.slug"></div>
                  </div>
                  <span class="text-xs text-gray-400" x-text="post.gscClicks + ' 次点击'"></span>
                </div>
              </template>
              <div x-show="!postsByStage.hot?.length" class="text-center py-4 text-gray-400">暂无</div>
            </div>
          </div>

          <div class="bg-white rounded-xl shadow-sm p-6">
            <h2 class="text-lg font-semibold mb-4 flex items-center">
              <span class="mr-2">🌡️</span> Warm 文章
              <span class="ml-2 px-2 py-0.5 bg-orange-100 text-orange-800 rounded-full text-xs" x-text="postsByStage.warm?.length || 0"></span>
            </h2>
            <div class="space-y-2 max-h-60 overflow-y-auto">
              <template x-for="post in postsByStage.warm" :key="post.id">
                <div class="flex items-center justify-between py-2 px-3 bg-gray-50 rounded">
                  <div>
                    <div class="font-medium text-sm" x-text="post.title"></div>
                    <div class="text-xs text-gray-500" x-text="post.slug"></div>
                  </div>
                  <span class="text-xs text-gray-400" x-text="post.gscClicks + ' 次点击'"></span>
                </div>
              </template>
              <div x-show="!postsByStage.warm?.length" class="text-center py-4 text-gray-400">暂无</div>
            </div>
          </div>

          <div class="bg-white rounded-xl shadow-sm p-6">
            <h2 class="text-lg font-semibold mb-4 flex items-center">
              <span class="mr-2">❄️</span> Cold 文章
              <span class="ml-2 px-2 py-0.5 bg-blue-100 text-blue-800 rounded-full text-xs" x-text="postsByStage.cold?.length || 0"></span>
            </h2>
            <div class="space-y-2 max-h-60 overflow-y-auto">
              <template x-for="post in postsByStage.cold" :key="post.id">
                <div class="flex items-center justify-between py-2 px-3 bg-gray-50 rounded">
                  <div>
                    <div class="font-medium text-sm" x-text="post.title"></div>
                    <div class="text-xs text-gray-500" x-text="post.slug"></div>
                  </div>
                  <span class="text-xs text-gray-400" x-text="post.gscClicks + ' 次点击'"></span>
                </div>
              </template>
              <div x-show="!postsByStage.cold?.length" class="text-center py-4 text-gray-400">暂无</div>
            </div>
          </div>

          <div class="bg-white rounded-xl shadow-sm p-6">
            <h2 class="text-lg font-semibold mb-4 flex items-center">
              <span class="mr-2">📦</span> Archive 文章
              <span class="ml-2 px-2 py-0.5 bg-gray-100 text-gray-800 rounded-full text-xs" x-text="postsByStage.archive?.length || 0"></span>
            </h2>
            <div class="space-y-2 max-h-60 overflow-y-auto">
              <template x-for="post in postsByStage.archive" :key="post.id">
                <div class="flex items-center justify-between py-2 px-3 bg-gray-50 rounded">
                  <div>
                    <div class="font-medium text-sm" x-text="post.title"></div>
                    <div class="text-xs text-gray-500" x-text="post.slug"></div>
                  </div>
                  <span class="text-xs text-gray-400" x-text="post.gscClicks + ' 次点击'"></span>
                </div>
              </template>
              <div x-show="!postsByStage.archive?.length" class="text-center py-4 text-gray-400">暂无</div>
            </div>
          </div>
        </div>

        <!-- Preview Changes -->
        <div class="bg-white rounded-xl shadow-sm p-6 mb-8">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold flex items-center">
              <span class="mr-2">👁️</span> 变更预览
            </h2>
            <button @click="runPreview" class="px-4 py-2 bg-gray-100 rounded-lg hover:bg-gray-200 transition">预览变更</button>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead class="bg-gray-50">
                <tr>
                  <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">文章</th>
                  <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">当前阶段</th>
                  <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">将变更为</th>
                  <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">阈值满足</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-gray-200">
                <template x-for="item in preview" :key="item.postId">
                  <tr class="hover:bg-gray-50">
                    <td class="px-4 py-3 text-sm" x-text="item.slug"></td>
                    <td class="px-4 py-3">
                      <span class="px-2 py-1 rounded text-xs" :class="stageBadgeClass(item.currentStage)" x-text="item.currentStage || '-'"></span>
                    </td>
                    <td class="px-4 py-3">
                      <template x-if="item.wouldChangeTo">
                        <span class="px-2 py-1 rounded text-xs" :class="actionBadgeClass(item.wouldChangeTo)" x-text="item.wouldChangeTo"></span>
                      </template>
                      <template x-if="!item.wouldChangeTo">
                        <span class="text-gray-400 text-sm">-</span>
                      </template>
                    </td>
                    <td class="px-4 py-3">
                      <span class="px-2 py-1 rounded text-xs" :class="item.thresholdMet ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-600'" x-text="item.thresholdMet ? '是' : '否'"></span>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
          <div x-show="preview.length === 0" class="text-center py-8 text-gray-500">点击"预览变更"查看将在自动操作中发生的变更</div>
        </div>
      </div>
    </main>

    <!-- Config Modal -->
    <div x-show="showConfigModal" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" @click.self="showConfigModal = false">
      <div class="bg-white rounded-xl p-6 w-full max-w-md" @click.stop>
        <h3 class="text-lg font-semibold mb-4" x-text="editingStage + ' 阶段配置'"></h3>
        <form @submit.prevent="saveConfig">
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">自动操作</label>
              <select x-model="configForm.autoAction" class="w-full px-4 py-2 border rounded-lg">
                <option value="noindex">Noindex</option>
                <option value="index">Index</option>
                <option value="archive">Archive</option>
                <option value="delete">删除</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">
                <input type="checkbox" x-model="configForm.enabled" class="mr-2" />
                启用自动操作
              </label>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">年龄阈值 (天数)</label>
              <input type="number" x-model="configForm.thresholdDays" class="w-full px-4 py-2 border rounded-lg" placeholder="可选" />
              <p class="text-xs text-gray-500 mt-1">文章必须达到此年龄才会触发自动操作</p>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">点击量阈值</label>
              <input type="number" x-model="configForm.thresholdClicks" class="w-full px-4 py-2 border rounded-lg" placeholder="可选" />
              <p class="text-xs text-gray-500 mt-1">GSC点击量必须低于此值才会触发</p>
            </div>
          </div>
          <div class="flex justify-end space-x-3 mt-6">
            <button type="button" @click="showConfigModal = false" class="px-4 py-2 border rounded-lg hover:bg-gray-50">取消</button>
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">保存</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('lifecycleManager', () => ({
        configs: [],
        postsByStage: { hot: [], warm: [], cold: [], archive: [] },
        preview: [],
        showConfigModal: false,
        editingStage: null,
        running: false,
        configForm: {
          autoAction: 'noindex',
          enabled: false,
          thresholdDays: null,
          thresholdClicks: null,
        },

        async init() {
          await this.loadData();
        },

        async loadData() {
          await Promise.all([
            this.loadConfigs(),
            this.loadPostsByStage(),
          ]);
        },

        async loadConfigs() {
          try {
            const res = await fetch('/api/lifecycle/configs');
            if (res.ok) {
              const data = await res.json();
              this.configs = data.configs || [];
            }
          } catch (e) { console.error('Failed to load configs:', e); }
        },

        async loadPostsByStage() {
          const stages = ['hot', 'warm', 'cold', 'archive'];
          for (const stage of stages) {
            try {
              const res = await fetch(`/api/lifecycle/posts/${stage}?limit=10`);
              if (res.ok) {
                const data = await res.json();
                this.postsByStage[stage] = data.posts || [];
              }
            } catch (e) { console.error(`Failed to load ${stage} posts:`, e); }
          }
        },

        getConfig(stage) {
          return this.configs.find(c => c.lifecycleStage === stage);
        },

        editConfig(stage) {
          this.editingStage = stage;
          const existing = this.getConfig(stage);
          if (existing) {
            this.configForm = {
              autoAction: existing.autoAction,
              enabled: !!existing.enabled,
              thresholdDays: existing.thresholdDays,
              thresholdClicks: existing.thresholdClicks,
            };
          } else {
            this.configForm = {
              autoAction: 'noindex',
              enabled: false,
              thresholdDays: null,
              thresholdClicks: null,
            };
          }
          this.showConfigModal = true;
        },

        async saveConfig() {
          try {
            await fetch(`/api/lifecycle/configs/${this.editingStage}`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.configForm),
            });
            this.showConfigModal = false;
            await this.loadConfigs();
          } catch (e) { console.error('Failed to save config:', e); }
        },

        async runEvaluation() {
          this.running = true;
          try {
            const res = await fetch('/api/lifecycle/evaluate', { method: 'POST' });
            if (res.ok) {
              const data = await res.json();
              alert(`评估完成: 处理了 ${data.processed} 篇文章，执行了 ${data.results?.length || 0} 项操作`);
              await this.loadData();
            }
          } catch (e) {
            console.error('Failed to run evaluation:', e);
            alert('运行评估时出错');
          } finally {
            this.running = false;
          }
        },

        async runPreview() {
          try {
            const res = await fetch('/api/lifecycle/preview', { method: 'POST' });
            if (res.ok) {
              const data = await res.json();
              this.preview = data.preview || [];
            }
          } catch (e) { console.error('Failed to run preview:', e); }
        },

        stageLabel(stage) {
          return { hot: 'Hot', warm: 'Warm', cold: 'Cold', archive: 'Archive' }[stage] || stage;
        },

        stageEmoji(stage) {
          return { hot: '🔥', warm: '🌡️', cold: '❄️', archive: '📦' }[stage] || '📄';
        },

        getActionLabel(action) {
          if (!action) return '未配置';
          return { noindex: '自动 Noindex', index: '自动 Index', archive: '自动 Archive', delete: '自动删除' }[action] || action;
        },

        stageBadgeClass(stage) {
          return {
            hot: 'bg-red-100 text-red-800',
            warm: 'bg-orange-100 text-orange-800',
            cold: 'bg-blue-100 text-blue-800',
            archive: 'bg-gray-100 text-gray-800',
          }[stage] || 'bg-gray-100 text-gray-800';
        },

        actionBadgeClass(action) {
          return {
            noindex: 'bg-gray-800 text-white',
            index: 'bg-green-600 text-white',
            archive: 'bg-yellow-600 text-white',
            delete: 'bg-red-600 text-white',
          }[action] || 'bg-gray-100 text-gray-800';
        },
      }));
    });
  </script>
</body>
</html>
