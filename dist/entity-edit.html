<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ isNew ? '添加实体' : '编辑实体' }} - 管理后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-100">
  <div class="flex min-h-screen" x-data="entityEdit">
    {{ include('partials/admin-sidebar') }}

    <main class="flex-1 p-8">
      <div class="max-w-4xl mx-auto">
        <div class="mb-6">
          <a href="/admin/entities" class="text-blue-600 hover:underline">← 返回实体列表</a>
        </div>

        <div class="bg-white rounded-xl shadow-sm p-8">
          <h1 class="text-2xl font-bold text-gray-900 mb-6" x-text="isNew ? '添加实体' : '编辑实体'"></h1>

          <form @submit.prevent="saveEntity" class="space-y-6">
            <!-- Name Field -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">名称 *</label>
              <input type="text" x-model="entity.name" @input="clearFieldError('name')" required
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                :class="errors.name ? 'border-red-500' : ''"
                placeholder="实体名称" />
              <p x-show="errors.name" class="text-red-500 text-sm mt-1" x-text="errors.name"></p>
            </div>

            <!-- Slug Field -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Slug *</label>
              <input type="text" x-model="entity.slug" @input="clearFieldError('slug'); validateSlug()" required
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono"
                :class="errors.slug ? 'border-red-500' : ''"
                placeholder="url-slug" />
              <p x-show="errors.slug" class="text-red-500 text-sm mt-1" x-text="errors.slug"></p>
              <p class="text-xs text-gray-500 mt-1">用于 URL 的唯一标识符，如 iphone-16（小写字母、数字和连字符）</p>
            </div>

            <!-- Type Field -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">类型</label>
              <select x-model="entity.type" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">选择类型</option>
                <option value="person">人物</option>
                <option value="place">地点</option>
                <option value="organization">组织</option>
                <option value="concept">概念</option>
                <option value="event">事件</option>
                <option value="product">产品</option>
                <option value="technology">技术</option>
              </select>
            </div>

            <!-- Description Field -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">描述</label>
              <textarea x-model="entity.description" rows="4" placeholder="实体描述..." class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
            </div>

            <!-- Thumbnail URL Field -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">缩略图 URL</label>
              <input type="url" x-model="entity.thumbnailUrl" @input="clearFieldError('thumbnailUrl')"
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                :class="errors.thumbnailUrl ? 'border-red-500' : ''"
                placeholder="https://..." />
              <p x-show="errors.thumbnailUrl" class="text-red-500 text-sm mt-1" x-text="errors.thumbnailUrl"></p>
            </div>

            <!-- Form-level Error -->
            <div x-show="formError" class="bg-red-50 border border-red-200 rounded-lg p-4">
              <p class="text-red-600" x-text="formError"></p>
            </div>

            <div class="flex items-center justify-between pt-4 border-t">
              <div x-show="entity.id" class="text-sm text-gray-500">
                ID: <span x-text="entity.id"></span>
              </div>
              <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">保存</button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script>
    document.addEventListener('alpine:init', () => {
      const pathParts = window.location.pathname.split('/');
      const isNew = pathParts[pathParts.length - 1] === 'new' || pathParts[pathParts.length - 2] === 'entities';

      Alpine.data('entityEdit', () => ({
        entity: { id: null, name: '', slug: '', type: '', description: '', thumbnailUrl: '' },
        isNew: isNew,
        loading: true,
        errors: {},
        formError: '',

        async init() {
          if (!this.isNew) {
            const slug = pathParts[pathParts.length - 1];
            if (slug && slug !== 'new' && slug !== 'entities') {
              try {
                const res = await fetch(`/api/entities/${slug}/full`);
                if (res.ok) {
                  const data = await res.json();
                  this.entity = {
                    id: data.id,
                    name: data.name || '',
                    slug: data.slug || '',
                    type: data.type || '',
                    description: data.description || '',
                    thumbnailUrl: data.thumbnailUrl || ''
                  };
                }
              } catch (e) { console.error('Failed to load entity:', e); }
            }
          }
          this.loading = false;
        },

        validateSlug() {
          const slug = this.entity.slug || '';
          if (slug && !/^[a-z0-9]+(?:-[a-z0-9]+)*$/.test(slug)) {
            this.errors.slug = 'Slug 只能包含小写字母、数字和连字符';
          } else {
            delete this.errors.slug;
          }
        },

        clearFieldError(field) {
          delete this.errors[field];
          this.formError = '';
        },

        async saveEntity() {
          this.errors = {};
          this.formError = '';

          // Frontend validation
          if (!this.entity.name || !this.entity.name.trim()) {
            this.errors.name = '名称不能为空';
            return;
          }
          if (!this.entity.slug || !this.entity.slug.trim()) {
            this.errors.slug = 'Slug不能为空';
            return;
          }
          if (!/^[a-z0-9]+(?:-[a-z0-9]+)*$/.test(this.entity.slug)) {
            this.errors.slug = 'Slug 只能包含小写字母、数字和连字符（如 iphone-16）';
            return;
          }
          if (this.entity.thumbnailUrl && this.entity.thumbnailUrl.trim()) {
            try {
              new URL(this.entity.thumbnailUrl);
            } catch (e) {
              this.errors.thumbnailUrl = '请输入有效的 URL';
              return;
            }
          }

          try {
            const method = this.entity.id ? 'PUT' : 'POST';
            const url = this.entity.id ? `/api/entities/${this.entity.slug}` : '/api/entities';
            const res = await fetch(url, {
              method,
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.entity)
            });

            const data = await res.json();

            if (res.ok) {
              if (!this.entity.id && data.entity?.slug) {
                this.entity.id = data.entity.id;
                history.replaceState({}, '', `/admin/entities/${data.entity.slug}/edit`);
              }
              alert('保存成功');
            } else if (data.error === 'Validation failed' && data.details) {
              // Handle validation errors from backend
              for (const detail of data.details) {
                if (detail.toLowerCase().includes('slug')) {
                  this.errors.slug = detail;
                } else if (detail.toLowerCase().includes('name')) {
                  this.errors.name = detail;
                } else {
                  this.formError = detail;
                }
              }
            } else {
              this.formError = data.error || '保存失败';
            }
          } catch (e) {
            console.error('Failed to save entity:', e);
            this.formError = '保存失败: ' + e.message;
          }
        }
      }));
    });
  </script>
</body>
</html>
