<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GSC 数据分析 - 管理后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-100">
  <div class="flex min-h-screen" x-data="gscAnalytics">
    {{ include('partials/admin-sidebar') }}

    <main class="flex-1 p-8">
      <div class="max-w-7xl mx-auto">
        <div class="flex items-center justify-between mb-8">
          <div>
            <h1 class="text-3xl font-bold text-gray-900">📈 GSC 数据分析</h1>
            <p class="text-gray-500 mt-1">Google Search Console 数据集成分析</p>
          </div>
          <div class="flex items-center space-x-3">
            <select x-model="dateRange" @change="loadData" class="px-4 py-2 border rounded-lg">
              <option value="7d">最近 7 天</option>
              <option value="28d">最近 28 天</option>
              <option value="90d">最近 90 天</option>
            </select>
            <button @click="syncGSC" :disabled="syncing" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition disabled:opacity-50">
              <span x-show="!syncing">🔄 同步 GSC</span>
              <span x-show="syncing">同步中...</span>
            </button>
          </div>
        </div>

        <!-- Overview Stats -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
          <div class="bg-white rounded-xl shadow-sm p-6">
            <div class="text-sm text-gray-500 mb-1">总展示量</div>
            <div class="text-3xl font-bold text-blue-600" x-text="stats.totalImpressions.toLocaleString()">-</div>
            <div class="flex items-center mt-2 text-sm" :class="stats.impressionsChange >= 0 ? 'text-green-600' : 'text-red-600'">
              <span x-text="stats.impressionsChange >= 0 ? '↑' : '↓'"></span>
              <span x-text="Math.abs(stats.impressionsChange).toFixed(1) + '%'"></span>
              <span class="text-gray-400 ml-1">vs 上期</span>
            </div>
          </div>
          <div class="bg-white rounded-xl shadow-sm p-6">
            <div class="text-sm text-gray-500 mb-1">总点击量</div>
            <div class="text-3xl font-bold text-green-600" x-text="stats.totalClicks.toLocaleString()">-</div>
            <div class="flex items-center mt-2 text-sm" :class="stats.clicksChange >= 0 ? 'text-green-600' : 'text-red-600'">
              <span x-text="stats.clicksChange >= 0 ? '↑' : '↓'"></span>
              <span x-text="Math.abs(stats.clicksChange).toFixed(1) + '%'"></span>
              <span class="text-gray-400 ml-1">vs 上期</span>
            </div>
          </div>
          <div class="bg-white rounded-xl shadow-sm p-6">
            <div class="text-sm text-gray-500 mb-1">平均 CTR</div>
            <div class="text-3xl font-bold text-purple-600" x-text="stats.avgCtr.toFixed(2) + '%'">-</div>
            <div class="flex items-center mt-2 text-sm" :class="stats.ctrChange >= 0 ? 'text-green-600' : 'text-red-600'">
              <span x-text="stats.ctrChange >= 0 ? '↑' : '↓'"></span>
              <span x-text="Math.abs(stats.ctrChange).toFixed(1) + '%'"></span>
              <span class="text-gray-400 ml-1">vs 上期</span>
            </div>
          </div>
          <div class="bg-white rounded-xl shadow-sm p-6">
            <div class="text-sm text-gray-500 mb-1">平均排名</div>
            <div class="text-3xl font-bold text-orange-600" x-text="stats.avgPosition.toFixed(1)">-</div>
            <div class="flex items-center mt-2 text-sm" :class="stats.positionChange <= 0 ? 'text-green-600' : 'text-red-600'">
              <span x-text="stats.positionChange <= 0 ? '↑' : '↓'"></span>
              <span x-text="Math.abs(stats.positionChange).toFixed(1)"></span>
              <span class="text-gray-400 ml-1">vs 上期</span>
            </div>
          </div>
        </div>

        <!-- Trend Chart Placeholder -->
        <div class="bg-white rounded-xl shadow-sm p-6 mb-8">
          <h2 class="text-lg font-semibold mb-4">📊 趋势图</h2>
          <div class="h-64 flex items-center justify-center bg-gray-50 rounded-lg">
            <div class="text-center text-gray-500">
              <div class="text-4xl mb-2">📈</div>
              <p>趋势图表 (需要 Chart.js 集成)</p>
            </div>
          </div>
          <!-- Simple ASCII chart as placeholder -->
          <div class="mt-4 font-mono text-xs text-gray-600 whitespace-pre" x-show="trendData.length > 0">
            <template x-for="(row, i) in trendChart" :key="i">
              <div x-text="row"></div>
            </template>
          </div>
        </div>

        <!-- Top Queries -->
        <div class="bg-white rounded-xl shadow-sm p-6 mb-8">
          <h2 class="text-lg font-semibold mb-4">🔍 Top 搜索查询</h2>
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead class="bg-gray-50">
                <tr>
                  <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">查询词</th>
                  <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">展示</th>
                  <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">点击</th>
                  <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">CTR</th>
                  <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">平均排名</th>
                  <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">趋势</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-gray-200">
                <template x-for="query in topQueries" :key="query.query">
                  <tr class="hover:bg-gray-50">
                    <td class="px-4 py-3 font-medium" x-text="query.query"></td>
                    <td class="px-4 py-3 text-gray-600" x-text="query.impressions.toLocaleString()"></td>
                    <td class="px-4 py-3 text-gray-600" x-text="query.clicks.toLocaleString()"></td>
                    <td class="px-4 py-3 text-gray-600" x-text="query.ctr.toFixed(2) + '%'"></td>
                    <td class="px-4 py-3 text-gray-600" x-text="query.position.toFixed(1)"></td>
                    <td class="px-4 py-3">
                      <span class="text-sm" :class="query.trend >= 0 ? 'text-green-600' : 'text-red-600'" x-text="query.trend >= 0 ? '↑' + query.trend : '↓' + Math.abs(query.trend)"></span>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
          <div x-show="topQueries.length === 0" class="text-center py-8 text-gray-500">暂无数据</div>
        </div>

        <!-- Pages Performance -->
        <div class="bg-white rounded-xl shadow-sm p-6">
          <h2 class="text-lg font-semibold mb-4">📄 页面性能排行</h2>
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead class="bg-gray-50">
                <tr>
                  <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">页面</th>
                  <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">展示</th>
                  <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">点击</th>
                  <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">CTR</th>
                  <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">排名</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-gray-200">
                <template x-for="page in topPages" :key="page.url">
                  <tr class="hover:bg-gray-50">
                    <td class="px-4 py-3">
                      <a :href="page.url" target="_blank" class="text-blue-600 hover:underline font-medium truncate max-w-xs block" x-text="page.url.replace('https://ai-seo-cms.pages.dev', '')"></a>
                    </td>
                    <td class="px-4 py-3 text-gray-600" x-text="page.impressions.toLocaleString()"></td>
                    <td class="px-4 py-3 text-gray-600" x-text="page.clicks.toLocaleString()"></td>
                    <td class="px-4 py-3 text-gray-600" x-text="page.ctr.toFixed(2) + '%'"></td>
                    <td class="px-4 py-3 text-gray-600" x-text="page.position.toFixed(1)"></td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
          <div x-show="topPages.length === 0" class="text-center py-8 text-gray-500">暂无数据</div>
        </div>
      </div>
    </main>
  </div>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('gscAnalytics', () => ({
        dateRange: '28d',
        syncing: false,
        stats: {
          totalImpressions: 125000,
          totalClicks: 8500,
          avgCtr: 6.8,
          avgPosition: 12.3,
          impressionsChange: 15.2,
          clicksChange: 8.5,
          ctrChange: -2.1,
          positionChange: -1.5
        },
        trendData: [],
        trendChart: [],
        topQueries: [
          { query: 'AI SEO 优化', impressions: 12500, clicks: 980, ctr: 7.84, position: 3.2, trend: 12 },
          { query: '内容质量评分', impressions: 8900, clicks: 620, ctr: 6.97, position: 5.1, trend: 8 },
          { query: '关键词布局', impressions: 7200, clicks: 450, ctr: 6.25, position: 7.3, trend: -3 },
          { query: '内链优化', impressions: 5600, clicks: 380, ctr: 6.79, position: 8.5, trend: 5 },
          { query: 'AI写作检测', impressions: 4200, clicks: 290, ctr: 6.90, position: 9.2, trend: 15 },
        ],
        topPages: [
          { url: 'https://ai-seo-cms.pages.dev/posts/ai-seo-guide', impressions: 15000, clicks: 1200, ctr: 8.0, position: 2.1 },
          { url: 'https://ai-seo-cms.pages.dev/posts/content-quality', impressions: 12500, clicks: 980, ctr: 7.84, position: 3.5 },
          { url: 'https://ai-seo-cms.pages.dev/posts/keyword-strategy', impressions: 9800, clicks: 720, ctr: 7.35, position: 4.2 },
          { url: 'https://ai-seo-cms.pages.dev/topics/seo-basics', impressions: 8200, clicks: 560, ctr: 6.83, position: 5.8 },
          { url: 'https://ai-seo-cms.pages.dev/posts/internal-linking', impressions: 6500, clicks: 420, ctr: 6.46, position: 7.1 },
        ],

        async init() {
          await this.loadData();
        },

        async loadData() {
          try {
            const res = await fetch(`/api/analytics/gsc?range=${this.dateRange}`);
            if (res.ok) {
              const data = await res.json();
              this.stats = data.stats || this.stats;
              this.trendData = data.trend || [];
            }
          } catch (e) {
            console.error('Failed to load GSC data:', e);
          }
          this.generateTrendChart();
        },

        async syncGSC() {
          this.syncing = true;
          try {
            const res = await fetch('/api/analytics/gsc/sync', { method: 'POST' });
            if (res.ok) {
              await this.loadData();
            }
          } catch (e) {
            console.error('Failed to sync GSC:', e);
          }
          this.syncing = false;
        },

        generateTrendChart() {
          // Generate simple ASCII chart
          const days = 7;
          const maxVal = 500;
          const data = [320, 350, 380, 360, 420, 450, 480];
          this.trendChart = [];

          for (let i = 5; i >= 0; i--) {
            let row = '';
            for (let j = 0; j < days; j++) {
              const threshold = (maxVal / 5) * i;
              row += data[j] >= threshold ? '█' : '░';
              row += '  ';
            }
            this.trendChart.push(row + ' ' + (maxVal / 5 * i));
          }
          this.trendChart.push('─────────────────────────────────────────');
          this.trendChart.push('  Day1   Day2   Day3   Day4   Day5   Day6   Day7');
        }
      }));
    });
  </script>
</body>
</html>
