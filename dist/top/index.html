<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title x-text="pageTitle">榜单 - AI Shopping</title>
  <meta name="description" :content="metaDescription" />
  <link rel="canonical" :href="currentUrl" />
  <script>
    (function() {
      const stored = localStorage.getItem('darkMode');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (stored === 'true' || (stored === null && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <!-- ItemList Schema -->
  <template x-if="products.length > 0">
    <script type="application/ld+json" x-json="JSON.stringify({
      '@context': 'https://schema.org',
      '@type': 'ItemList',
      'name': listTitle,
      'description': metaDescription,
      'url': currentUrl,
      'numberOfItems': products.length,
      'itemListElement': products.map((p, i) => ({
        '@type': 'ListItem',
        'position': i + 1,
        'item': {
          '@type': 'Product',
          'name': p.name,
          'description': p.description,
          'image': p.thumbnailUrl,
          'brand': p.brand ? { '@type': 'Brand', 'name': p.brand } : undefined,
          'url': '/product/' + p.slug
        }
      }))
    })"></script>
  </template>
</head>
<body class="bg-gray-50 min-h-screen dark:bg-gray-900">

  <!-- Header -->
  <header class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50 dark:bg-gray-800 dark:border-gray-700" x-data="{ mobileMenuOpen: false, darkMode: localStorage.getItem('darkMode') === 'true' || window.matchMedia('(prefers-color-scheme: dark)').matches }">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-14 sm:h-16">
        <div class="flex items-center space-x-4">
          <a href="/" class="text-xl font-bold text-indigo-600 hover:text-indigo-700">AI Shopping</a>
          <nav class="hidden md:flex items-center text-sm text-gray-500 space-x-1 dark:text-gray-400">
            <a href="/" class="hover:text-indigo-600 dark:hover:text-indigo-400">首页</a>
            <span>/</span>
            <span class="text-gray-900 dark:text-gray-100" x-text="categoryName"></span>
          </nav>
        </div>
        <div class="flex items-center gap-2">
          <button @click="darkMode = !darkMode; localStorage.setItem('darkMode', darkMode); document.documentElement.classList.toggle('dark', darkMode)" class="p-2 min-w-[48px] min-h-[48px] flex items-center justify-center rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition">
            <i x-show="!darkMode" class="fas fa-moon text-gray-600"></i>
            <i x-show="darkMode" class="fas fa-sun text-yellow-400"></i>
          </button>
          <a href="/search" class="p-2 min-w-[48px] min-h-[48px] flex items-center justify-center rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition">
            <i class="fas fa-search text-gray-600 dark:text-gray-400"></i>
          </a>
        </div>
      </div>
    </div>
  </header>

  <!-- Hero Banner -->
  <div class="bg-gradient-to-r from-amber-500 to-orange-600 text-white py-10 px-4">
    <div class="max-w-7xl mx-auto">
      <div class="flex items-center gap-3 mb-3">
        <i class="fas fa-trophy text-3xl"></i>
        <span class="text-amber-100 text-sm font-medium" x-text="categoryName + ' 榜单'"></span>
      </div>
      <h1 class="text-2xl sm:text-3xl font-bold mb-2" x-text="listTitle"></h1>
      <p class="text-amber-100 text-sm" x-text="introText"></p>
    </div>
  </div>

  <!-- AI Intro Section -->
  <div x-show="aiIntro" class="bg-white border-b border-gray-200 dark:bg-gray-800 dark:border-gray-700">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
      <div class="flex items-start gap-3">
        <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center flex-shrink-0 mt-1 dark:bg-indigo-900">
          <i class="fas fa-robot text-indigo-600 text-sm dark:text-indigo-400"></i>
        </div>
        <div>
          <h2 class="text-sm font-semibold text-gray-900 mb-1 dark:text-gray-100">AI 评选说明</h2>
          <p class="text-gray-600 text-sm leading-relaxed dark:text-gray-400" x-text="aiIntro"></p>
        </div>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div x-show="loading" class="text-center py-16">
      <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-indigo-500 border-t-transparent"></div>
      <p class="text-gray-500 mt-3">加载榜单数据...</p>
    </div>

    <div x-show="!loading && products.length === 0" class="text-center py-16">
      <div class="text-6xl mb-4">🏆</div>
      <h2 class="text-xl font-bold text-gray-900 mb-2 dark:text-gray-100">暂无榜单数据</h2>
      <p class="text-gray-500 mb-6">该分类下暂无推荐商品，试试其他分类吧。</p>
      <a href="/products" class="px-6 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">浏览全部商品</a>
    </div>

    <div x-show="!loading && products.length > 0" class="space-y-4">
      <template x-for="(product, index) in products" :key="product.id">
        <div :id="'top-' + (index + 1)" class="bg-white rounded-xl shadow-sm hover:shadow-md transition overflow-hidden dark:bg-gray-800">
          <div class="flex flex-col sm:flex-row">
            <div class="sm:w-20 bg-gradient-to-b from-gray-50 to-gray-100 flex flex-col items-center justify-center py-6 sm:py-0 dark:from-gray-700 dark:to-gray-800">
              <div class="text-3xl font-bold" :class="getRankClass(index + 1)" x-text="index + 1"></div>
              <div x-show="index < 3" class="text-xs text-gray-500 mt-1">
                <i :class="getMedalIcon(index + 1)"></i>
              </div>
            </div>

            <a :href="'/product/' + product.slug" class="sm:w-40 h-40 sm:h-auto flex-shrink-0 bg-gray-100 overflow-hidden dark:bg-gray-700">
              <img :src="product.thumbnailUrl || '/placeholder.png'" :alt="product.name" class="w-full h-full object-cover" loading="lazy" />
            </a>

            <div class="flex-1 p-4 sm:p-6">
              <div class="flex flex-col sm:flex-row sm:items-start justify-between gap-4">
                <div class="flex-1">
                  <div x-show="product.brand" class="text-xs text-gray-400 mb-1 dark:text-gray-500" x-text="product.brand"></div>
                  <a :href="'/product/' + product.slug" class="block">
                    <h3 class="text-lg font-semibold text-gray-900 hover:text-indigo-600 mb-2 dark:text-gray-100 dark:hover:text-indigo-400" x-text="product.name"></h3>
                  </a>
                  <p class="text-sm text-gray-600 line-clamp-2 mb-3 dark:text-gray-400" x-text="product.description || product.summary || ''"></p>

                  <div x-show="product.aiRecommendation" class="bg-indigo-50 rounded-lg p-3 dark:bg-indigo-900/30">
                    <div class="flex items-start gap-2">
                      <i class="fas fa-lightbulb text-indigo-500 mt-1 text-sm dark:text-indigo-400"></i>
                      <div>
                        <div class="text-xs font-medium text-indigo-700 mb-1 dark:text-indigo-300">推荐理由</div>
                        <p class="text-sm text-indigo-900 dark:text-indigo-200" x-text="product.aiRecommendation"></p>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="text-right">
                  <div class="text-xl font-bold text-indigo-600 dark:text-indigo-400" x-text="formatPrice(product.currentPrice)"></div>
                  <div x-show="product.originalPrice" class="text-sm text-gray-400 line-through dark:text-gray-500" x-text="formatPrice(product.originalPrice)"></div>
                  <div x-show="product.discountPercent" class="text-sm text-red-500 font-medium mt-1" x-text="'-' + product.discountPercent + '%'"></div>
                </div>
              </div>

              <div x-show="product.platforms && product.platforms.length > 0" class="mt-4 flex flex-wrap gap-2">
                <template x-for="platform in product.platforms.slice(0, 3)" :key="platform.id">
                  <a :href="'/go/' + platform.affiliateToken" target="_blank" rel="noopener sponsored" class="text-xs px-3 py-1 bg-gray-100 hover:bg-gray-200 rounded-full text-gray-700 dark:bg-gray-700 dark:text-gray-300">
                    <span x-text="platform.platform"></span>
                    <span x-show="platform.currentPrice" class="font-medium ml-1" x-text="'$' + platform.currentPrice"></span>
                  </a>
                </template>
              </div>
            </div>
          </div>
        </div>
      </template>
    </div>

    <div x-show="!loading && relatedCategories.length > 0" class="mt-12">
      <h2 class="text-lg font-bold text-gray-900 mb-4 dark:text-gray-100">相关榜单</h2>
      <div class="flex flex-wrap gap-3">
        <template x-for="cat in relatedCategories" :key="cat.slug">
          <a :href="'/top/' + cat.slug" class="px-4 py-2 bg-white border border-gray-200 rounded-full text-sm text-gray-700 hover:border-indigo-500 hover:text-indigo-600 dark:bg-gray-800 dark:border-gray-600 dark:text-gray-300 dark:hover:text-indigo-400">
            <i class="fas fa-list mr-1"></i>
            <span x-text="cat.name"></span>
          </a>
        </template>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-900 text-gray-400 py-8 mt-auto">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-sm">
      <p class="mb-4"><strong>联盟信息披露：</strong>详见 <a href="/affiliate-disclosure" class="text-indigo-400 hover:underline">联盟信息披露</a>。</p>
      <p>&copy; <span x-text="new Date().getFullYear()">2026</span> AI Shopping. AI驱动的全球商品推荐平台.</p>
    </div>
  </footer>

  <script>
    function topPage() {
      return {
        loading: true,
        categorySlug: '',
        categoryName: '',
        listTitle: '',
        introText: '',
        aiIntro: '',
        products: [],
        relatedCategories: [],

        async init() {
          const path = window.location.pathname;
          const match = path.match(/\/top\/([^/]+)/);
          if (match) {
            this.categorySlug = match[1];
            await this.loadTopProducts();
          } else {
            this.loading = false;
          }
        },

        get pageTitle() {
          return this.listTitle || '榜单 - AI Shopping';
        },

        get metaDescription() {
          return `${this.categoryName || '商品'}排行榜，AI智能推荐优质商品，实时价格对比，帮你找到最值得购买的产品。`;
        },

        get currentUrl() {
          return window.location.href;
        },

        async loadTopProducts() {
          this.loading = true;
          try {
            const response = await fetch(`/api/products/top/${this.categorySlug}`);
            const data = await response.json();
            if (data.success || data.products) {
              this.categoryName = data.categoryName || this.categorySlug;
              this.listTitle = data.listTitle || `${this.categoryName} 排行榜`;
              this.introText = data.introText || `精选 ${this.categoryName} 热门商品推荐`;
              this.aiIntro = data.aiIntro || '';
              this.products = data.products || [];
              this.relatedCategories = data.relatedCategories || [];
            }
          } catch (err) {
            console.error('Failed to load top products:', err);
          } finally {
            this.loading = false;
          }
        },

        getRankClass(rank) {
          if (rank === 1) return 'text-yellow-500';
          if (rank === 2) return 'text-gray-400';
          if (rank === 3) return 'text-amber-600';
          return 'text-gray-500';
        },

        getMedalIcon(rank) {
          if (rank === 1) return 'fas fa-medal text-yellow-500';
          if (rank === 2) return 'fas fa-medal text-gray-400';
          if (rank === 3) return 'fas fa-medal text-amber-600';
          return '';
        },

        formatPrice(price) {
          if (!price) return '价格待定';
          return '$' + Number(price).toFixed(2);
        },
      };
    }
  </script>
</body>
</html>
