<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title x-text="pageTitle">Deals - AI Shopping</title>
  <meta name="description" :content="metaDescription" />
  <link rel="canonical" :href="currentUrl" />
  <script>
    (function() {
      const stored = localStorage.getItem('darkMode');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (stored === 'true' || (stored === null && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <!-- Deals Event Schema -->
  <template x-if="deals.length > 0">
    <script type="application/ld+json" x-json="JSON.stringify({
      '@context': 'https://schema.org',
      '@type': 'Offer',
      'description': metaDescription,
      'url': currentUrl,
      'itemOffered': deals.map(d => ({
        '@type': 'Product',
        'name': d.name,
        'image': d.thumbnailUrl,
        'brand': d.brand ? { '@type': 'Brand', 'name': d.brand } : undefined,
        'sku': d.slug
      }))
    })"></script>
  </template>
</head>
<body class="bg-gray-50 min-h-screen dark:bg-gray-900">

  <!-- Header -->
  <header class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50 dark:bg-gray-800 dark:border-gray-700" x-data="{ mobileMenuOpen: false, darkMode: localStorage.getItem('darkMode') === 'true' || window.matchMedia('(prefers-color-scheme: dark)').matches }">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-14 sm:h-16">
        <a href="/" class="text-xl font-bold text-indigo-600 hover:text-indigo-700">AI Shopping</a>
        <nav class="hidden md:flex items-center text-sm text-gray-500 space-x-1 dark:text-gray-400">
          <a href="/" class="hover:text-indigo-600 dark:hover:text-indigo-400">首页</a>
          <span>/</span>
          <span class="text-gray-900 dark:text-gray-100">Deals</span>
        </nav>
        <div class="flex items-center gap-2">
          <button @click="darkMode = !darkMode; localStorage.setItem('darkMode', darkMode); document.documentElement.classList.toggle('dark', darkMode)" class="p-2 min-w-[48px] min-h-[48px] flex items-center justify-center rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition">
            <i x-show="!darkMode" class="fas fa-moon text-gray-600"></i>
            <i x-show="darkMode" class="fas fa-sun text-yellow-400"></i>
          </button>
          <a href="/search" class="p-2 min-w-[48px] min-h-[48px] flex items-center justify-center rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition">
            <i class="fas fa-search text-gray-600 dark:text-gray-400"></i>
          </a>
        </div>
      </div>
    </div>
  </header>

  <!-- Hero Banner -->
  <div class="bg-gradient-to-r from-red-600 to-pink-600 text-white py-10 px-4">
    <div class="max-w-7xl mx-auto">
      <div class="flex items-center gap-3 mb-3">
        <i class="fas fa-fire text-3xl"></i>
        <span class="text-red-100 text-sm font-medium">限时折扣</span>
      </div>
      <h1 class="text-2xl sm:text-3xl font-bold mb-2">今日 Deals</h1>
      <p class="text-red-100 text-sm">精选限时优惠商品，历史最低价，错过不再有</p>
    </div>
  </div>

  <!-- Filter Bar -->
  <div class="bg-white border-b border-gray-200 dark:bg-gray-800 dark:border-gray-700">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3">
      <div class="flex flex-wrap items-center gap-3">
        <select x-model="filterCategory" @change="loadDeals()" class="px-3 py-2 border border-gray-300 rounded-lg text-sm dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100">
          <option value="">全部分类</option>
          <template x-for="cat in categories" :key="cat.slug">
            <option :value="cat.slug" x-text="cat.name"></option>
          </template>
        </select>

        <select x-model="filterDiscount" @change="loadDeals()" class="px-3 py-2 border border-gray-300 rounded-lg text-sm dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100">
          <option value="">折扣幅度</option>
          <option value="10">≥ 10% Off</option>
          <option value="20">≥ 20% Off</option>
          <option value="30">≥ 30% Off</option>
          <option value="50">≥ 50% Off</option>
        </select>

        <div class="flex items-center gap-2">
          <input type="number" x-model="priceMin" placeholder="最低价" class="w-20 px-2 py-2 border border-gray-300 rounded-lg text-sm dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100" @keyup.enter="loadDeals()" />
          <span class="text-gray-400">-</span>
          <input type="number" x-model="priceMax" placeholder="最高价" class="w-20 px-2 py-2 border border-gray-300 rounded-lg text-sm dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100" @keyup.enter="loadDeals()" />
          <button @click="loadDeals()" class="px-3 py-2 bg-indigo-600 text-white rounded-lg text-sm hover:bg-indigo-700">应用</button>
        </div>

        <select x-model="sortBy" @change="loadDeals()" class="px-3 py-2 border border-gray-300 rounded-lg text-sm dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100">
          <option value="discount">折扣力度</option>
          <option value="price_asc">价格 ↑</option>
          <option value="price_desc">价格 ↓</option>
          <option value="savings">省下多少</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div x-show="loading" class="text-center py-16">
      <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-red-500 border-t-transparent"></div>
      <p class="text-gray-500 mt-3">加载折扣商品...</p>
    </div>

    <div x-show="!loading && deals.length === 0" class="text-center py-16">
      <div class="text-6xl mb-4">🏷️</div>
      <h2 class="text-xl font-bold text-gray-900 mb-2 dark:text-gray-100">暂无折扣商品</h2>
      <p class="text-gray-500 mb-6">当前没有正在促销的商品，稍后再来看看吧。</p>
      <a href="/products" class="px-6 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">浏览全部商品</a>
    </div>

    <div x-show="!loading && deals.length > 0" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      <template x-for="deal in deals" :key="deal.id">
        <div class="bg-white rounded-xl shadow-sm hover:shadow-lg transition overflow-hidden relative dark:bg-gray-800">
          <div x-show="deal.discountPercent >= 50" class="absolute top-3 left-3 z-10 bg-red-500 text-white text-xs font-bold px-2 py-1 rounded-full">
            <i class="fas fa-fire mr-1"></i> HOT
          </div>
          <div x-show="deal.discountPercent < 50 && deal.discountPercent >= 20" class="absolute top-3 left-3 z-10 bg-orange-500 text-white text-xs font-bold px-2 py-1 rounded-full">
            <i class="fas fa-tag mr-1"></i> SALE
          </div>

          <a :href="'/product/' + deal.slug" class="block aspect-square bg-gray-100 overflow-hidden relative dark:bg-gray-700">
            <img :src="deal.thumbnailUrl || '/placeholder.png'" :alt="deal.name" class="w-full h-full object-cover" loading="lazy" />
            <div x-show="deal.discountPercent" class="absolute top-3 right-3 bg-red-500 text-white font-bold px-2 py-1 rounded-lg text-lg" x-text="'-' + deal.discountPercent + '%'"></div>
            <div x-show="deal.isHistoricalLow" class="absolute bottom-3 left-3 bg-green-500 text-white text-xs font-bold px-2 py-1 rounded-full">
              <i class="fas fa-chart-line mr-1"></i> 历史低价
            </div>
          </a>

          <div class="p-4">
            <div x-show="deal.brand" class="text-xs text-gray-400 mb-1 dark:text-gray-500" x-text="deal.brand"></div>
            <a :href="'/product/' + deal.slug" class="block">
              <h3 class="text-sm font-medium text-gray-900 line-clamp-2 mb-2 hover:text-indigo-600 dark:text-gray-100" x-text="deal.name"></h3>
            </a>

            <div class="mb-3">
              <div class="flex items-baseline gap-2">
                <span class="text-xl font-bold text-red-500" x-text="'$' + Number(deal.currentPrice).toFixed(2)"></span>
                <span x-show="deal.originalPrice" class="text-sm text-gray-400 line-through dark:text-gray-500" x-text="'$' + Number(deal.originalPrice).toFixed(2)"></span>
              </div>
              <div x-show="deal.savings" class="text-xs text-green-600 mt-1">
                <i class="fas fa-piggy-bank mr-1"></i>
                省 <span x-text="'$' + Number(deal.savings).toFixed(2)"></span>
              </div>
            </div>

            <div class="flex flex-wrap gap-2">
              <template x-for="platform in deal.platforms.slice(0, 2)" :key="platform.id">
                <a :href="'/go/' + platform.affiliateToken" target="_blank" rel="noopener sponsored" class="text-xs px-2 py-1 bg-gray-100 hover:bg-gray-200 rounded text-gray-700 dark:bg-gray-700 dark:text-gray-300">
                  <span x-text="platform.platform"></span>
                </a>
              </template>
              <span x-show="deal.platforms && deal.platforms.length > 2" class="text-xs text-gray-400 px-2 py-1" x-text="'+' + (deal.platforms.length - 2) + ' more'"></span>
            </div>
          </div>
        </div>
      </template>
    </div>

    <div x-show="!loading && hasMore" class="mt-8 text-center">
      <button @click="loadMore()" class="px-8 py-3 bg-white border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 dark:bg-gray-800 dark:border-gray-600 dark:text-gray-300">
        加载更多
      </button>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-900 text-gray-400 py-8 mt-auto">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-sm">
      <p class="mb-4"><strong>联盟信息披露：</strong>详见 <a href="/affiliate-disclosure" class="text-indigo-400 hover:underline">联盟信息披露</a>。</p>
      <p>&copy; <span x-text="new Date().getFullYear()">2026</span> AI Shopping. AI驱动的全球商品推荐平台.</p>
    </div>
  </footer>

  <script>
    function dealsPage() {
      return {
        loading: true,
        deals: [],
        categories: [],
        page: 1,
        limit: 20,
        hasMore: false,
        filterCategory: '',
        filterDiscount: '',
        priceMin: '',
        priceMax: '',
        sortBy: 'discount',

        async init() {
          await this.loadCategories();
          await this.loadDeals();
        },

        get pageTitle() {
          return '今日 Deals - AI Shopping';
        },

        get metaDescription() {
          return '精选限时折扣商品，实时更新，历史最低价，帮你省更多。';
        },

        get currentUrl() {
          return window.location.href;
        },

        async loadCategories() {
          try {
            const response = await fetch('/api/categories');
            const data = await response.json();
            this.categories = data.categories || [];
          } catch (err) {
            console.error('Failed to load categories:', err);
          }
        },

        async loadDeals() {
          this.loading = true;
          this.page = 1;
          try {
            const params = new URLSearchParams({
              page: this.page,
              limit: this.limit,
              sort: this.sortBy,
            });
            if (this.filterCategory) params.append('category', this.filterCategory);
            if (this.filterDiscount) params.append('minDiscount', this.filterDiscount);
            if (this.priceMin) params.append('priceMin', this.priceMin);
            if (this.priceMax) params.append('priceMax', this.priceMax);

            const response = await fetch('/api/products/deals?' + params.toString());
            const data = await response.json();
            if (data.success || data.deals) {
              this.deals = data.deals || [];
              this.hasMore = data.hasMore || false;
            }
          } catch (err) {
            console.error('Failed to load deals:', err);
          } finally {
            this.loading = false;
          }
        },

        async loadMore() {
          this.page++;
          try {
            const params = new URLSearchParams({
              page: this.page,
              limit: this.limit,
              sort: this.sortBy,
            });
            if (this.filterCategory) params.append('category', this.filterCategory);
            if (this.filterDiscount) params.append('minDiscount', this.filterDiscount);
            if (this.priceMin) params.append('priceMin', this.priceMin);
            if (this.priceMax) params.append('priceMax', this.priceMax);

            const response = await fetch('/api/products/deals?' + params.toString());
            const data = await response.json();
            if (data.success || data.deals) {
              this.deals = [...this.deals, ...(data.deals || [])];
              this.hasMore = data.hasMore || false;
            }
          } catch (err) {
            console.error('Failed to load more deals:', err);
            this.page--;
          }
        },
      };
    }
  </script>
</body>
</html>
