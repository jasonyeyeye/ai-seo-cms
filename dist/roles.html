<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>角色管理 - {{ siteName }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-100">
  <div class="flex min-h-screen" x-data="rolesAdmin">
    {{ include('partials/admin-sidebar') }}

    <main class="flex-1 p-8">
      <div class="max-w-7xl mx-auto">
        <div class="flex items-center justify-between mb-8">
          <h1 class="text-3xl font-bold text-gray-900">角色管理</h1>
        </div>

        <!-- Roles Grid with detailed permissions -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
          <template x-for="role in roles" :key="role.name">
            <div class="bg-white rounded-xl shadow-sm p-6">
              <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-bold" x-text="role.label"></h3>
                <span class="px-2 py-1 rounded text-xs" :class="roleClass(role.name)" x-text="role.name"></span>
              </div>
              <p class="text-gray-500 text-sm mb-4" x-text="role.description"></p>
              <div class="border-t pt-4">
                <div class="text-xs font-medium text-gray-500 mb-2">默认权限:</div>
                <div class="flex flex-wrap gap-1">
                  <template x-for="perm in role.permissions.slice(0, 5)" :key="perm">
                    <span class="px-2 py-0.5 bg-gray-100 text-gray-600 rounded text-xs" x-text="perm"></span>
                  </template>
                  <span x-show="role.permissions.length > 5" class="px-2 py-0.5 bg-gray-100 text-gray-600 rounded text-xs" x-text="'+' + (role.permissions.length - 5) + ' more'"></span>
                </div>
              </div>
              <!-- Inheritance indicator -->
              <div x-show="role.inherits" class="mt-3 text-xs text-blue-600">
                <span>继承自: </span><span x-text="role.inherits"></span>
              </div>
            </div>
          </template>
        </div>

        <!-- Custom Role Creation -->
        <div class="mt-8 bg-white rounded-xl shadow-sm p-6">
          <h2 class="text-xl font-bold mb-4">创建自定义角色</h2>
          <div class="grid grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">角色名称</label>
              <input type="text" x-model="newRole.name" class="w-full px-3 py-2 border rounded-lg" placeholder="custom_role" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">显示名称</label>
              <input type="text" x-model="newRole.label" class="w-full px-3 py-2 border rounded-lg" placeholder="自定义角色" />
            </div>
            <div class="col-span-2">
              <label class="block text-sm font-medium text-gray-700 mb-2">继承自</label>
              <select x-model="newRole.inherits" class="w-full px-3 py-2 border rounded-lg">
                <option value="">无 (独立角色)</option>
                <template x-for="role in roles" :key="role.name">
                  <option :value="role.name" x-text="role.label"></option>
                </template>
              </select>
            </div>
            <div class="col-span-2">
              <label class="block text-sm font-medium text-gray-700 mb-3">权限选择</label>
              <div class="grid grid-cols-3 md:grid-cols-4 gap-2">
                <template x-for="(desc, perm) in permissions" :key="perm">
                  <label class="flex items-center p-2 border rounded-lg hover:bg-gray-50 cursor-pointer"
                         :class="newRole.permissions.includes(perm) ? 'border-blue-400 bg-blue-50' : ''">
                    <input type="checkbox" :value="perm" x-model="newRole.permissions" class="mr-2" />
                    <span class="text-xs" x-text="perm.split(':')[1] || perm"></span>
                  </label>
                </template>
              </div>
            </div>
          </div>
          <div class="mt-4 flex space-x-3">
            <button @click="createRole" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
              创建角色
            </button>
            <button @click="clearNewRole" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
              清空
            </button>
          </div>
        </div>

        <!-- Role Permissions Matrix -->
        <div class="mt-8 bg-white rounded-xl shadow-sm p-6">
          <h2 class="text-xl font-bold mb-4">权限矩阵</h2>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead>
                <tr class="border-b">
                  <th class="text-left py-2 px-3">权限</th>
                  <th class="text-center py-2 px-3">读取</th>
                  <th class="text-center py-2 px-3">写入</th>
                  <th class="text-center py-2 px-3">删除</th>
                  <th class="text-center py-2 px-3">执行</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="(desc, perm) in permissions" :key="perm">
                  <tr class="border-b hover:bg-gray-50">
                    <td class="py-2 px-3">
                      <div class="font-mono text-xs text-blue-600" x-text="perm"></div>
                      <div class="text-xs text-gray-500" x-text="desc"></div>
                    </td>
                    <td class="text-center py-2 px-3">
                      <span x-show="hasPermission(perm, 'read')" class="text-green-600">✓</span>
                      <span x-show="!hasPermission(perm, 'read')" class="text-gray-300">○</span>
                    </td>
                    <td class="text-center py-2 px-3">
                      <span x-show="hasPermission(perm, 'write')" class="text-green-600">✓</span>
                      <span x-show="!hasPermission(perm, 'write')" class="text-gray-300">○</span>
                    </td>
                    <td class="text-center py-2 px-3">
                      <span x-show="hasPermission(perm, 'delete')" class="text-green-600">✓</span>
                      <span x-show="!hasPermission(perm, 'delete')" class="text-gray-300">○</span>
                    </td>
                    <td class="text-center py-2 px-3">
                      <span x-show="hasPermission(perm, 'execute')" class="text-green-600">✓</span>
                      <span x-show="!hasPermission(perm, 'execute')" class="text-gray-300">○</span>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Permissions Reference -->
        <div class="mt-8 bg-white rounded-xl shadow-sm p-6">
          <h2 class="text-xl font-bold mb-4">权限参考</h2>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <template x-for="(desc, perm) in permissions" :key="perm">
              <div class="p-3 border rounded-lg">
                <div class="font-mono text-sm text-blue-600" x-text="perm"></div>
                <div class="text-xs text-gray-500 mt-1" x-text="desc"></div>
              </div>
            </template>
          </div>
        </div>
      </div>

      <!-- Toast -->
      <div x-show="toast.show" x-transition class="fixed bottom-4 right-4 bg-gray-800 text-white px-6 py-3 rounded-xl shadow-lg z-50">
        <span x-text="toast.message"></span>
      </div>
    </main>
  </div>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('rolesAdmin', () => ({
        roles: [],
        permissions: {},
        toast: { show: false, message: '' },
        newRole: {
          name: '',
          label: '',
          inherits: '',
          permissions: []
        },

        async init() {
          await this.loadRoles();
          await this.loadPermissions();
        },

        async loadRoles() {
          try {
            const res = await fetch('/api/roles');
            if (res.ok) {
              const data = await res.json();
              this.roles = data.roles;
            }
          } catch (e) { console.error('Failed to load roles:', e); }
        },

        async loadPermissions() {
          try {
            const res = await fetch('/api/roles/permissions');
            if (res.ok) {
              const data = await res.json();
              this.permissions = data.permissions;
            }
          } catch (e) { console.error('Failed to load permissions:', e); }
        },

        roleClass(role) {
          return { admin: 'bg-red-100 text-red-800', editor: 'bg-blue-100 text-blue-800', reviewer: 'bg-purple-100 text-purple-800', viewer: 'bg-gray-100 text-gray-800' }[role] || 'bg-gray-100';
        },

        showToast(message) {
          this.toast.message = message;
          this.toast.show = true;
          setTimeout(() => { this.toast.show = false; }, 3000);
        },

        async createRole() {
          if (!this.newRole.name || !this.newRole.label) {
            this.showToast('请填写角色名称和显示名称');
            return;
          }

          try {
            const res = await fetch('/api/roles', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.newRole)
            });

            if (res.ok) {
              const data = await res.json();
              this.roles.push(data.role);
              this.clearNewRole();
              this.showToast('角色创建成功');
            } else {
              const err = await res.json();
              this.showToast('创建失败: ' + (err.error || 'Unknown error'));
            }
          } catch (e) {
            console.error('Failed to create role:', e);
            this.showToast('创建失败');
          }
        },

        clearNewRole() {
          this.newRole = { name: '', label: '', inherits: '', permissions: [] };
        },

        hasPermission(perm, action) {
          // Check if permission supports the action
          const permParts = perm.split(':');
          const resource = permParts[1] || permParts[0];
          const actionMap = {
            read: ['read'],
            write: ['write', 'create', 'update'],
            delete: ['delete', 'remove'],
            execute: ['execute', 'run']
          };
          // Simplified check - in real app would check against role permissions
          return true;
        }
      }));
    });
  </script>
</body>
</html>
