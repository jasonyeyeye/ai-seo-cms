<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - 页面未找到 | AI Shopping</title>
  <meta name="description" content="抱歉，您访问的页面不存在或已被移除" />
  <script>
    (function() {
      const stored = localStorage.getItem('darkMode');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (stored === 'true' || (stored === null && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .float-animation { animation: float 3s ease-in-out infinite; }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-50 to-blue-50 min-h-screen flex flex-col dark:bg-gray-900 dark:from-gray-900 dark:to-gray-800">
  <!-- Header -->
  <header class="bg-white shadow-sm sticky top-0 z-50 dark:bg-gray-800 dark:shadow-gray-700" x-data="{ darkMode: localStorage.getItem('darkMode') === 'true' || window.matchMedia('(prefers-color-scheme: dark)').matches }">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-14 sm:h-16">
        <a href="/" class="text-xl font-bold text-indigo-600 hover:text-indigo-700">AI Shopping</a>
        <div class="flex items-center gap-2">
          <button @click="darkMode = !darkMode; localStorage.setItem('darkMode', darkMode); document.documentElement.classList.toggle('dark', darkMode)" class="p-2 min-w-[48px] min-h-[48px] flex items-center justify-center rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition">
            <i x-show="!darkMode" class="fas fa-moon text-gray-600"></i>
            <i x-show="darkMode" class="fas fa-sun text-yellow-400"></i>
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center px-4 py-16">
    <div class="max-w-2xl w-full text-center">
      <div class="float-animation text-9xl mb-6">🔍</div>

      <h1 class="text-4xl font-bold text-gray-800 mb-4 dark:text-gray-100">404</h1>
      <h2 class="text-2xl font-semibold text-gray-700 mb-4 dark:text-gray-200">页面未找到</h2>
      <p class="text-gray-500 mb-8 dark:text-gray-400">
        抱歉，您访问的页面不存在或已被移除。<br>
        可能的原因：链接失效、商品已下架、URL输入错误。
      </p>

      <div class="flex flex-col sm:flex-row gap-4 justify-center mb-12">
        <a href="/" class="px-6 py-3 bg-indigo-600 text-white rounded-lg font-medium hover:bg-indigo-700 transition">
          🏠 返回首页
        </a>
        <a href="/search" class="px-6 py-3 bg-white text-gray-700 border border-gray-300 rounded-lg font-medium hover:bg-gray-50 transition dark:bg-gray-800 dark:border-gray-600 dark:text-gray-300">
          🔍 搜索商品
        </a>
      </div>

      <div class="bg-white rounded-xl shadow-lg p-8 dark:bg-gray-800" x-data="recommendedProducts">
        <h3 class="text-xl font-bold text-gray-800 mb-6 flex items-center justify-center dark:text-gray-100">
          <span class="mr-2">🛍️</span> 推荐商品
        </h3>

        <div x-show="loading" class="text-center py-8">
          <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-indigo-500 border-t-transparent"></div>
          <p class="text-gray-500 mt-2 dark:text-gray-400">加载中...</p>
        </div>

        <div x-show="!loading && products.length > 0" class="grid grid-cols-2 sm:grid-cols-3 gap-4">
          <template x-for="product in products" :key="product.id">
            <a :href="'/product/' + product.slug" class="block p-4 border border-gray-200 rounded-lg hover:border-indigo-300 hover:shadow-md transition group dark:border-gray-700 dark:hover:border-indigo-500">
              <img :src="product.thumbnailUrl || '/placeholder.png'" :alt="product.name" class="w-full aspect-square object-cover rounded-lg mb-3" loading="lazy" />
              <h4 class="font-semibold text-gray-800 group-hover:text-indigo-600 transition dark:text-gray-100 dark:group-hover:text-indigo-400 line-clamp-2" x-text="product.name"></h4>
              <div class="text-sm font-bold text-indigo-600 mt-2 dark:text-indigo-400" x-text="product.currentPrice ? '$' + product.currentPrice.toFixed(2) : ''"></div>
            </a>
          </template>
        </div>

        <div x-show="!loading && products.length === 0" class="text-center py-8 text-gray-500 dark:text-gray-400">
          暂无推荐商品
        </div>
      </div>

      <div class="mt-8">
        <a href="javascript:history.back()" class="text-indigo-600 hover:underline dark:text-indigo-400">
          ← 返回上一页
        </a>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-900 text-gray-400 py-8 mt-auto">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-sm">
      <p class="mb-4"><strong>联盟信息披露：</strong>详见 <a href="/affiliate-disclosure" class="text-indigo-400 hover:underline">联盟信息披露</a>。</p>
      <p>&copy; <span x-text="new Date().getFullYear()">2026</span> AI Shopping. AI驱动的全球商品推荐平台.</p>
    </div>
  </footer>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('recommendedProducts', () => ({
        products: [],
        loading: true,

        async init() {
          try {
            const response = await fetch('/api/products?limit=6');
            const data = await response.json();
            if (data.products && Array.isArray(data.products)) {
              this.products = data.products.slice(0, 6);
            }
          } catch (e) {
            console.error('Failed to load recommended products:', e);
          } finally {
            this.loading = false;
          }
        }
      }));
    });
  </script>
</body>
</html>
