<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>流水线配置 - 管理后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body class="bg-gray-100">
  <div class="flex min-h-screen" x-data="pipelineAdmin">
    {{ include('partials/admin-sidebar') }}

    <main class="flex-1 p-8">
      <div class="max-w-5xl mx-auto">
        <div class="flex items-center justify-between mb-8">
          <div>
            <h1 class="text-3xl font-bold text-gray-900">🔄 内容生成流水线</h1>
            <p class="text-gray-500 mt-1">配置和管理内容生成的各个阶段</p>
          </div>
          <div class="flex space-x-3">
            <label class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition cursor-pointer">
              <span>导入配置</span>
              <input type="file" accept=".json" class="hidden" @change="importConfig" />
            </label>
            <button @click="resetToDefault" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
              重置为默认
            </button>
            <button @click="savePipeline" :disabled="saving" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition disabled:opacity-50">
              <span x-text="saving ? '保存中...' : '保存配置'"></span>
            </button>
            <button @click="exportConfig" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
              导出配置
            </button>
          </div>
        </div>

        <!-- Pipeline Stages -->
        <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
          <h2 class="text-lg font-semibold mb-4">阶段顺序（拖拽调整）</h2>
          <p class="text-sm text-gray-500 mb-6">拖拽阶段卡片可以调整执行顺序，关闭开关可以跳过该阶段</p>

          <div x-show="loading" class="text-center py-12 text-gray-500">加载中...</div>

          <div x-show="!loading" id="pipeline-stages" class="space-y-4">
            <template x-for="(stage, index) in stages" :key="stage.id">
              <div class="stage-card border-2 border-gray-200 rounded-xl p-6 bg-white hover:border-blue-300 transition"
                   :class="{ 'border-green-500 bg-green-50': stage.enabled, 'border-gray-200 bg-gray-50': !stage.enabled }">
                <div class="flex items-start gap-4">
                  <!-- Drag Handle -->
                  <div class="pt-1 cursor-grab text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16"/>
                    </svg>
                  </div>

                  <!-- Order Number -->
                  <div class="flex-shrink-0 w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-sm">
                    <span x-text="index + 1"></span>
                  </div>

                  <!-- Stage Info -->
                  <div class="flex-1">
                    <div class="flex items-center justify-between mb-2">
                      <div class="flex items-center gap-3">
                        <h3 class="text-lg font-semibold text-gray-900" x-text="stage.name"></h3>
                        <span class="px-2 py-1 text-xs rounded" :class="stage.enabled ? 'bg-green-100 text-green-800' : 'bg-gray-200 text-gray-500'" x-text="stage.enabled ? '已启用' : '已禁用'"></span>
                      </div>
                      <!-- Enable Toggle -->
                      <button @click="stage.enabled = !stage.enabled" class="relative w-12 h-6 rounded-full transition-colors" :class="stage.enabled ? 'bg-blue-600' : 'bg-gray-300'">
                        <span class="absolute top-1 left-1 w-4 h-4 bg-white rounded-full transition-transform" :class="stage.enabled ? 'translate-x-6' : ''"></span>
                      </button>
                    </div>
                    <p class="text-sm text-gray-500 mb-4" x-text="stage.description"></p>

                    <!-- Parameters -->
                    <div class="grid grid-cols-4 gap-4">
                      <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">温度</label>
                        <input type="number" step="0.1" min="0" max="1" x-model.number="stage.parameters.temperature" class="w-full px-3 py-2 border rounded-lg text-sm" :disabled="!stage.enabled" />
                      </div>
                      <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">最大 Token</label>
                        <input type="number" min="256" max="128000" step="256" x-model.number="stage.parameters.maxTokens" class="w-full px-3 py-2 border rounded-lg text-sm" :disabled="!stage.enabled" />
                      </div>
                      <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">模型</label>
                        <select x-model="stage.parameters.model" class="w-full px-3 py-2 border rounded-lg text-sm" :disabled="!stage.enabled">
                          <option value="gpt-4o">GPT-4o</option>
                          <option value="gpt-4o-mini">GPT-4o Mini</option>
                          <option value="claude-3-5-sonnet">Claude 3.5 Sonnet</option>
                          <option value="claude-3-haiku">Claude 3 Haiku</option>
                          <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                        </select>
                      </div>
                      <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">Prompt 模板</label>
                        <input type="text" x-model="stage.parameters.promptTemplate" placeholder="可选" class="w-full px-3 py-2 border rounded-lg text-sm" :disabled="!stage.enabled" />
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </div>

        <!-- Pipeline Preview -->
        <div class="bg-white rounded-xl shadow-sm p-6">
          <h2 class="text-lg font-semibold mb-4">流水线预览</h2>
          <div class="flex items-center justify-between overflow-x-auto pb-4">
            <template x-for="(stage, index) in enabledStages" :key="stage.id">
              <div class="flex items-center">
                <div class="flex flex-col items-center">
                  <div class="w-12 h-12 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold" x-text="index + 1"></div>
                  <span class="text-sm text-gray-600 mt-2 whitespace-nowrap" x-text="stage.name"></span>
                </div>
                <div x-show="index < enabledStages.length - 1" class="w-12 h-0.5 bg-gray-300 mx-2"></div>
              </div>
            </template>
          </div>
          <div class="mt-4 text-center text-gray-500 text-sm">
            共 <span x-text="enabledStages.length"></span> 个阶段将被执行
          </div>
        </div>

        <!-- Toast Component -->
        <div x-data="toast" x-show="show" x-transition class="fixed bottom-4 right-4 bg-gray-800 text-white px-6 py-3 rounded-xl shadow-lg z-50">
          <span x-text="message"></span>
        </div>
      </div>
    </main>
  </div>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('toast', () => ({
        show: false,
        message: '',
        showToast(message) {
          this.message = message;
          this.show = true;
          setTimeout(() => { this.show = false; }, 3000);
        }
      }));

      Alpine.data('pipelineAdmin', () => ({
        stages: [],
        loading: true,
        saving: false,
        configName: 'default',

        get enabledStages() {
          return this.stages.filter(s => s.enabled);
        },

        async init() {
          await this.loadPipeline();
          this.$nextTick(() => this.initSortable());
        },

        async loadPipeline() {
          this.loading = true;
          try {
            const res = await fetch('/api/content/pipeline');
            if (res.ok) {
              const data = await res.json();
              this.stages = data.stages || [];
              this.configName = data.configName || 'default';
            }
          } catch (e) {
            console.error('Failed to load pipeline:', e);
          }
          this.loading = false;
        },

        async savePipeline() {
          this.saving = true;
          try {
            // Update order based on current array position
            const orderedStages = this.stages.map((stage, index) => ({
              ...stage,
              order: index + 1
            }));

            const res = await fetch('/api/content/pipeline', {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                stages: orderedStages,
                configName: this.configName
              })
            });

            if (res.ok) {
              this.showToast('配置已保存');
            } else {
              const err = await res.json();
              this.showToast('保存失败: ' + (err.error || 'Unknown error'));
            }
          } catch (e) {
            console.error('Failed to save pipeline:', e);
            this.showToast('保存失败');
          }
          this.saving = false;
        },

        async resetToDefault() {
          if (!confirm('确定要重置为默认配置吗？当前配置将被覆盖。')) return;
          try {
            const res = await fetch('/api/content/pipeline/reset', { method: 'POST' });
            if (res.ok) {
              const data = await res.json();
              this.stages = data.stages || [];
              this.configName = 'default';
              this.$nextTick(() => this.initSortable());
              this.showToast('已重置为默认配置');
            }
          } catch (e) {
            console.error('Failed to reset pipeline:', e);
          }
        },

        exportConfig() {
          const config = {
            version: 1,
            configName: this.configName,
            exportedAt: new Date().toISOString(),
            stages: this.stages.map((stage, index) => ({
              ...stage,
              order: index + 1
            }))
          };
          const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `pipeline-config-${this.configName}-${Date.now()}.json`;
          a.click();
          URL.revokeObjectURL(url);
        },

        async importConfig(event) {
          const file = event.target.files?.[0];
          if (!file) return;

          try {
            const text = await file.text();
            const config = JSON.parse(text);
            if (config.stages && Array.isArray(config.stages)) {
              this.stages = config.stages;
              this.configName = config.configName || 'imported';
              this.showToast('配置已导入');
              this.$nextTick(() => this.initSortable());
            }
          } catch (e) {
            this.showToast('导入失败: Invalid config file');
          }
        },

        initSortable() {
          const el = document.getElementById('pipeline-stages');
          if (!el) return;

          new Sortable(el, {
            animation: 150,
            handle: '.cursor-grab',
            ghostClass: 'opacity-50',
            onEnd: (evt) => {
              const item = this.stages.splice(evt.oldIndex, 1)[0];
              this.stages.splice(evt.newIndex, 0, item);
            }
          });
        },

        showToast(message) {
          const toast = document.querySelector('[x-show="toast.show"]');
          if (toast) {
            toast.__x.$data.showToast(message);
          }
        }
      }));
    });
  </script>
</body>
</html>
