<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title x-text="query ? '\"' + query + '\" 搜索结果 - AI Shopping' : '搜索 - AI Shopping'">搜索 - AI Shopping</title>
  <meta name="description" content="搜索全球优质商品，比较价格，查看真实评价。" />
  <link rel="canonical" href="/search" />
  <script>
    (function() {
      const stored = localStorage.getItem('darkMode');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (stored === 'true' || (stored === null && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <!-- SearchAction Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "AI Shopping",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "/search?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>
</head>
<body class="bg-gray-50 min-h-screen dark:bg-gray-900">

  <!-- Header -->
  <header class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50 dark:bg-gray-800 dark:border-gray-700" x-data="{ darkMode: localStorage.getItem('darkMode') === 'true' || window.matchMedia('(prefers-color-scheme: dark)').matches }">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <a href="/" class="text-xl font-bold text-indigo-600 hover:text-indigo-700">AI Shopping</a>
        <div class="flex-1 max-w-2xl mx-8">
          <div class="relative" x-data="searchBox">
            <input type="text" x-model="query" @input="onInput()" @keydown.up.prevent="navigateSuggestion(-1)" @keydown.down.prevent="navigateSuggestion(1)" @keyup.enter="doSearch()" @keydown.enter.prevent="selectHighlighted()" placeholder="搜索商品、品牌或分类..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100" />
            <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
            <div x-show="showSuggestions && suggestions.length > 0" x-transition class="absolute z-50 w-full mt-1 bg-white border border-gray-200 rounded-lg shadow-lg max-h-64 overflow-y-auto dark:bg-gray-700 dark:border-gray-600">
              <template x-for="(s, idx) in suggestions" :key="idx">
                <button @click="selectSuggestion(s)" class="w-full px-4 py-2 text-left hover:bg-indigo-50 flex items-center gap-2 dark:hover:bg-gray-600" :class="highlightedIndex === idx ? 'bg-indigo-50 dark:bg-gray-600' : ''">
                  <i class="fas fa-search text-gray-400 text-sm"></i>
                  <span x-html="highlightQuery(s, query)"></span>
                </button>
              </template>
            </div>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button @click="darkMode = !darkMode; localStorage.setItem('darkMode', darkMode); document.documentElement.classList.toggle('dark', darkMode)" class="p-2 min-w-[48px] min-h-[48px] flex items-center justify-center rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition">
            <i x-show="!darkMode" class="fas fa-moon text-gray-600"></i>
            <i x-show="darkMode" class="fas fa-sun text-yellow-400"></i>
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="flex gap-8">
      <!-- Sidebar: Hot Searches -->
      <aside x-show="!query || query.length === 0" class="w-64 flex-shrink-0 hidden lg:block">
        <div class="bg-white rounded-xl shadow-sm p-5 sticky top-20 dark:bg-gray-800">
          <h3 class="text-lg font-bold text-gray-900 mb-4 flex items-center dark:text-gray-100">
            <i class="fas fa-fire text-orange-500 mr-2"></i> 热门搜索
          </h3>
          <div class="space-y-2">
            <template x-for="(item, idx) in hotSearches" :key="idx">
              <button @click="query = item.query || item; doSearch()" class="w-full flex items-center justify-between px-3 py-2 rounded-lg hover:bg-indigo-50 transition text-left dark:hover:bg-gray-700">
                <div class="flex items-center gap-2">
                  <span class="text-sm font-bold" :class="idx < 3 ? 'text-orange-500' : 'text-gray-400'" x-text="idx + 1"></span>
                  <span class="text-sm text-gray-700 dark:text-gray-300" x-text="item.query || item"></span>
                </div>
              </button>
            </template>
          </div>
        </div>
      </aside>

      <!-- Main Results -->
      <div class="flex-1">
        <div x-show="query" class="mb-6">
          <h1 class="text-xl font-bold text-gray-900 dark:text-gray-100">
            搜索 "<span class="text-indigo-600 dark:text-indigo-400" x-text="query"></span>"
            <span class="text-gray-400 text-base font-normal ml-2" x-text="totalResults + ' 个结果'"></span>
          </h1>
        </div>

        <div x-show="!query || query.length === 0" class="lg:hidden mb-6 text-center py-8">
          <div class="text-6xl mb-4">🔍</div>
          <h2 class="text-2xl font-bold text-gray-900 mb-4 dark:text-gray-100">搜索全球好物</h2>
          <p class="text-gray-500 mb-8 max-w-md mx-auto">输入商品名称、品牌或分类关键词，找到最适合你的商品</p>
          <div class="flex flex-wrap justify-center gap-2 mb-8">
            <span class="text-gray-500 text-sm">热门搜索：</span>
            <template x-for="item in hotSearches" :key="idx">
              <button @click="query = item.query || item; doSearch()" class="px-3 py-1 bg-indigo-100 text-indigo-700 text-sm rounded-full hover:bg-indigo-200 dark:bg-indigo-900 dark:text-indigo-300" x-text="item.query || item"></button>
            </template>
          </div>
        </div>

        <div x-show="products.length > 0" class="mb-6 flex flex-wrap items-center gap-3">
          <select x-model="sortBy" @change="doSearch()" class="px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100">
            <option value="relevance">相关度</option>
            <option value="latest">最新上架</option>
            <option value="price_asc">价格从低到高</option>
            <option value="price_desc">价格从高到低</option>
          </select>
          <select x-model="filterPlatform" @change="doSearch()" class="px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100">
            <option value="">全部平台</option>
            <option value="amazon">Amazon</option>
            <option value="ebay">eBay</option>
            <option value="cj">CJ Affiliate</option>
          </select>
        </div>

        <div x-show="loading" class="text-center py-16">
          <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-indigo-500 border-t-transparent"></div>
          <p class="text-gray-500 mt-3">搜索中...</p>
        </div>

        <div x-show="!loading && queried && products.length === 0" class="text-center py-16">
          <div class="text-6xl mb-4">😕</div>
          <h2 class="text-xl font-bold text-gray-900 mb-2 dark:text-gray-100">没有找到相关商品</h2>
          <p class="text-gray-500 mb-6">试试其他关键词，或者浏览我们的热门分类</p>
          <div class="flex flex-wrap justify-center gap-3">
            <a href="/category/electronics" class="px-4 py-2 bg-gray-100 rounded-lg hover:bg-gray-200 dark:bg-gray-700">电子产品</a>
            <a href="/category/home-appliances" class="px-4 py-2 bg-gray-100 rounded-lg hover:bg-gray-200 dark:bg-gray-700">家用电器</a>
            <a href="/category/fashion" class="px-4 py-2 bg-gray-100 rounded-lg hover:bg-gray-200 dark:bg-gray-700">时尚服饰</a>
            <a href="/category/beauty" class="px-4 py-2 bg-gray-100 rounded-lg hover:bg-gray-200 dark:bg-gray-700">美妆护肤</a>
          </div>
        </div>

        <div x-show="!loading && products.length > 0" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
          <template x-for="product in products" :key="product.id">
            <a :href="'/product/' + product.slug" class="bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-md transition group dark:bg-gray-800">
              <div class="aspect-square bg-gray-100 overflow-hidden relative dark:bg-gray-700">
                <img :src="product.thumbnailUrl || '/placeholder.png'" :alt="product.name" class="w-full h-full object-cover group-hover:scale-105 transition" loading="lazy" />
                <div x-show="product.discountPercent" class="absolute top-2 right-2 bg-red-500 text-white text-xs font-bold px-2 py-1 rounded-full" x-text="'-' + product.discountPercent + '%'"></div>
              </div>
              <div class="p-3">
                <div x-show="product.brand" class="text-xs text-gray-400 mb-1 dark:text-gray-500" x-text="product.brand"></div>
                <h3 class="text-sm font-medium text-gray-900 line-clamp-2 mb-2 dark:text-gray-100" x-html="highlightQuery(product.name, query)"></h3>
                <div class="flex items-center justify-between">
                  <span class="text-base font-bold text-indigo-600 dark:text-indigo-400" x-text="formatPrice(product.currentPrice)"></span>
                  <span class="text-xs text-gray-400 dark:text-gray-500" x-text="product.platform || ''"></span>
                </div>
              </div>
            </a>
          </template>
        </div>

        <div x-show="!loading && totalPages > 1" class="mt-8 flex justify-center items-center gap-2">
          <button @click="goToPage(currentPage - 1)" :disabled="currentPage <= 1" class="px-4 py-2 border border-gray-300 rounded-lg disabled:opacity-50 hover:bg-gray-50 dark:bg-gray-800 dark:border-gray-600">
            <i class="fas fa-chevron-left"></i>
          </button>
          <template x-for="p in visiblePages" :key="p">
            <button @click="goToPage(p)" class="px-4 py-2 border rounded-lg" :class="p === currentPage ? 'bg-indigo-600 text-white border-indigo-600' : 'border-gray-300 hover:bg-gray-50 dark:bg-gray-800 dark:border-gray-600'" x-text="p"></button>
          </template>
          <button @click="goToPage(currentPage + 1)" :disabled="currentPage >= totalPages" class="px-4 py-2 border border-gray-300 rounded-lg disabled:opacity-50 hover:bg-gray-50 dark:bg-gray-800 dark:border-gray-600">
            <i class="fas fa-chevron-right"></i>
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-900 text-gray-400 py-8 mt-auto">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-sm">
      <p class="mb-4"><strong>联盟信息披露：</strong>详见 <a href="/affiliate-disclosure" class="text-indigo-400 hover:underline">联盟信息披露</a>。</p>
      <p>&copy; <span x-text="new Date().getFullYear()">2026</span> AI Shopping. AI驱动的全球商品推荐平台.</p>
    </div>
  </footer>

  <script>
  document.addEventListener('alpine:init', () => {
    Alpine.data('searchBox', () => ({
      query: '',
      products: [],
      loading: false,
      queried: false,
      currentPage: 1,
      totalPages: 0,
      totalResults: 0,
      pageSize: 20,
      sortBy: 'relevance',
      filterPlatform: '',
      hotSearches: [],
      suggestions: [],
      showSuggestions: false,
      highlightedIndex: -1,
      searchDebounceTimer: null,
      get visiblePages() {
        const pages = [];
        const start = Math.max(1, this.currentPage - 2);
        const end = Math.min(this.totalPages, start + 4);
        for (let i = start; i <= end; i++) pages.push(i);
        return pages;
      },
      async init() {
        const params = new URLSearchParams(window.location.search);
        this.query = params.get('q') || '';
        await this.loadHotSearches();
        if (this.query) {
          await this.doSearch();
        }
      },
      onInput() {
        this.showSuggestions = true;
        this.highlightedIndex = -1;
        clearTimeout(this.searchDebounceTimer);
        if (this.query.length < 2) {
          this.suggestions = [];
          return;
        }
        this.searchDebounceTimer = setTimeout(() => {
          this.loadSuggestions();
        }, 200);
      },
      async loadSuggestions() {
        try {
          const res = await fetch('/api/search/autocomplete?q=' + encodeURIComponent(this.query));
          if (res.ok) {
            const data = await res.json();
            this.suggestions = data.suggestions || [];
          }
        } catch(e) { console.error(e); }
      },
      async loadHotSearches() {
        try {
          const res = await fetch('/api/search/hot');
          if (res.ok) {
            const data = await res.json();
            this.hotSearches = data.hotSearches || [
              { query: 'iPhone' }, { query: 'Sony耳机' }, { query: '戴森吸尘器' },
              { query: 'Nintendo Switch' }, { query: 'MacBook' }, { query: 'AirPods' }, { query: 'iPad' }
            ];
          } else {
            this.hotSearches = [
              { query: 'iPhone' }, { query: 'Sony耳机' }, { query: '戴森吸尘器' },
              { query: 'Nintendo Switch' }, { query: 'MacBook' }, { query: 'AirPods' }, { query: 'iPad' }
            ];
          }
        } catch(e) {
          this.hotSearches = [
            { query: 'iPhone' }, { query: 'Sony耳机' }, { query: '戴森吸尘器' },
            { query: 'Nintendo Switch' }, { query: 'MacBook' }, { query: 'AirPods' }, { query: 'iPad' }
          ];
        }
      },
      navigateSuggestion(dir) {
        if (this.suggestions.length === 0) return;
        this.highlightedIndex = Math.max(-1, Math.min(this.suggestions.length - 1, this.highlightedIndex + dir));
      },
      selectHighlighted() {
        if (this.highlightedIndex >= 0 && this.suggestions[this.highlightedIndex]) {
          this.selectSuggestion(this.suggestions[this.highlightedIndex]);
        } else {
          this.doSearch();
        }
      },
      selectSuggestion(s) {
        this.query = s;
        this.showSuggestions = false;
        this.suggestions = [];
        this.doSearch();
      },
      async doSearch() {
        if (!this.query && !this.filterPlatform) return;
        this.showSuggestions = false;
        this.loading = true;
        this.queried = true;
        this.currentPage = 1;
        await this.loadResults();
        this.logSearch(this.query);
      },
      async logSearch(q) {
        try {
          await fetch('/api/search/log', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: q })
          });
        } catch(e) { console.error(e); }
      },
      async loadResults() {
        this.loading = true;
        try {
          let url = '/api/search?q=' + encodeURIComponent(this.query) + '&page=' + this.currentPage + '&limit=' + this.pageSize;
          if (this.sortBy !== 'relevance') url += '&sort=' + this.sortBy;
          if (this.filterPlatform) url += '&platform=' + this.filterPlatform;
          const res = await fetch(url);
          if (res.ok) {
            const data = await res.json();
            this.products = data.products || [];
            this.totalResults = data.pagination?.total || this.products.length;
            this.totalPages = data.pagination?.totalPages || 1;
            this.currentPage = data.pagination?.page || 1;
            const params = new URLSearchParams(window.location.search);
            params.set('q', this.query);
            history.replaceState(null, '', '?' + params.toString());
          }
        } catch(e) { console.error(e); }
        this.loading = false;
      },
      goToPage(page) {
        this.currentPage = page;
        this.loadResults();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      },
      formatPrice(price) {
        if (!price) return '';
        return '$' + parseFloat(price).toFixed(2);
      },
      highlightQuery(text, query) {
        if (!query || !text) return text;
        const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        return text.replace(new RegExp('(' + escaped + ')', 'gi'), '<mark class="bg-yellow-200 dark:bg-yellow-800">$1</mark>');
      }
    }));
  });
  </script>
</body>
</html>
