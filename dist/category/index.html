<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title x-text="categoryName ? categoryName + ' - AI Shopping' : '分类 - AI Shopping'">分类 - AI Shopping</title>
  <meta name="description" :content="'浏览' + (categoryName || '全部商品') + '分类下的优质商品，AI智能推荐，实时价格对比。'" />
  <link rel="canonical" :href="currentUrl" />
  <script>
    (function() {
      const stored = localStorage.getItem('darkMode');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (stored === 'true' || (stored === null && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <!-- BreadcrumbList Schema -->
  <template x-if="breadcrumbs.length > 0">
    <script type="application/ld+json" x-json="JSON.stringify({
      '@context': 'https://schema.org',
      '@type': 'BreadcrumbList',
      'itemListElement': breadcrumbs.map((crumb, i) => ({
        '@type': 'ListItem',
        'position': i + 1,
        'name': crumb.name,
        'item': crumb.url
      }))
    })"></script>
  </template>

  <!-- CollectionPage Schema -->
  <template x-if="categoryName">
    <script type="application/ld+json" x-json="JSON.stringify({
      '@context': 'https://schema.org',
      '@type': 'CollectionPage',
      'name': categoryName + ' - AI Shopping',
      'description': 'Browse ' + categoryName + ' products'
    })"></script>
  </template>
</head>
<body class="bg-gray-50 min-h-screen dark:bg-gray-900">

  <!-- Header -->
  <header class="bg-white shadow-sm sticky top-0 z-50 dark:bg-gray-800 dark:shadow-gray-700" x-data="{ mobileMenuOpen: false, darkMode: localStorage.getItem('darkMode') === 'true' || window.matchMedia('(prefers-color-scheme: dark)').matches }">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-14 sm:h-16">
        <div class="flex items-center space-x-4">
          <a href="/" class="text-xl font-bold text-indigo-600 hover:text-indigo-700">AI Shopping</a>
          <nav class="hidden md:flex items-center text-sm text-gray-500 space-x-1 dark:text-gray-400">
            <template x-for="(crumb, idx) in breadcrumbs" :key="crumb.url">
              <span class="flex items-center">
                <span x-show="idx > 0" class="mx-1 text-gray-400">/</span>
                <a x-show="idx < breadcrumbs.length - 1" :href="crumb.url" class="hover:text-indigo-600 dark:hover:text-indigo-400" x-text="crumb.name"></a>
                <span x-show="idx === breadcrumbs.length - 1" class="text-gray-900 dark:text-gray-100" x-text="crumb.name"></span>
              </span>
            </template>
          </nav>
        </div>
        <div class="flex items-center gap-2">
          <button @click="darkMode = !darkMode; localStorage.setItem('darkMode', darkMode); document.documentElement.classList.toggle('dark', darkMode)" class="p-2 min-w-[48px] min-h-[48px] flex items-center justify-center rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition">
            <i x-show="!darkMode" class="fas fa-moon text-gray-600"></i>
            <i x-show="darkMode" class="fas fa-sun text-yellow-400"></i>
          </button>
          <a href="/search" class="p-2 min-w-[48px] min-h-[48px] flex items-center justify-center rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition">
            <i class="fas fa-search text-gray-600 dark:text-gray-400"></i>
          </a>
        </div>
      </div>
    </div>
  </header>

  <!-- Category Banner -->
  <div class="bg-gradient-to-r from-indigo-500 to-purple-600 text-white py-8 px-4">
    <div class="max-w-7xl mx-auto">
      <h1 class="text-2xl sm:text-3xl font-bold mb-2" x-text="categoryName || '全部商品'"></h1>
      <p class="text-indigo-100 text-sm" x-text="totalProducts + ' 件商品'"></p>
    </div>
  </div>

  <!-- Filter Bar -->
  <div class="bg-white border-b border-gray-200 sticky top-16 z-40 dark:bg-gray-800 dark:border-gray-700">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3">
      <div class="flex flex-wrap items-center gap-3">
        <select x-model="sortBy" @change="loadProducts()" class="px-3 py-2 border border-gray-300 rounded-lg text-sm dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100">
          <option value="latest">最新上架</option>
          <option value="hot">热门畅销</option>
          <option value="price_asc">价格 ↑</option>
          <option value="price_desc">价格 ↓</option>
        </select>

        <select x-model="filterBrand" @change="loadProducts()" class="px-3 py-2 border border-gray-300 rounded-lg text-sm dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100">
          <option value="">全部品牌</option>
          <template x-for="brand in availableBrands" :key="brand">
            <option :value="brand" x-text="brand"></option>
          </template>
        </select>

        <div class="flex items-center gap-2">
          <input type="number" x-model="priceMin" placeholder="最低价" class="w-20 px-2 py-2 border border-gray-300 rounded-lg text-sm dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100" @keyup.enter="loadProducts()" />
          <span class="text-gray-400">-</span>
          <input type="number" x-model="priceMax" placeholder="最高价" class="w-20 px-2 py-2 border border-gray-300 rounded-lg text-sm dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100" @keyup.enter="loadProducts()" />
          <button @click="loadProducts()" class="px-3 py-2 bg-indigo-600 text-white rounded-lg text-sm hover:bg-indigo-700">应用</button>
        </div>

        <select x-model="filterPlatform" @change="loadProducts()" class="px-3 py-2 border border-gray-300 rounded-lg text-sm dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100">
          <option value="">全部平台</option>
          <option value="amazon">Amazon</option>
          <option value="ebay">eBay</option>
          <option value="cj">CJ Affiliate</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Product Grid -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div x-show="loading" class="text-center py-16">
      <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-indigo-500 border-t-transparent"></div>
      <p class="text-gray-500 mt-3">加载中...</p>
    </div>

    <div x-show="!loading && products.length === 0" class="text-center py-16">
      <div class="text-6xl mb-4">📦</div>
      <h2 class="text-xl font-bold text-gray-900 mb-2 dark:text-gray-100">暂无商品</h2>
      <p class="text-gray-500 mb-6">该分类下暂无商品，试试其他分类吧。</p>
      <a href="/products" class="px-6 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">浏览全部商品</a>
    </div>

    <div x-show="!loading && products.length > 0" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
      <template x-for="product in products" :key="product.id">
        <a :href="'/product/' + product.slug" class="bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-md transition group dark:bg-gray-800">
          <div class="aspect-square bg-gray-100 overflow-hidden relative dark:bg-gray-700">
            <img :src="product.thumbnailUrl || '/placeholder.png'" :alt="product.name" class="w-full h-full object-cover group-hover:scale-105 transition" loading="lazy" />
            <div x-show="product.discountPercent" class="absolute top-2 right-2 bg-red-500 text-white text-xs font-bold px-2 py-1 rounded-full" x-text="'-' + product.discountPercent + '%'"></div>
          </div>
          <div class="p-3">
            <div x-show="product.brand" class="text-xs text-gray-400 mb-1 dark:text-gray-500" x-text="product.brand"></div>
            <h3 class="text-sm font-medium text-gray-900 line-clamp-2 mb-2 dark:text-gray-100" x-text="product.name"></h3>
            <div class="flex items-center justify-between">
              <div>
                <span class="text-base font-bold text-indigo-600 dark:text-indigo-400" x-text="formatPrice(product.currentPrice)"></span>
                <span x-show="product.originalPrice" class="text-xs text-gray-400 line-through ml-1 dark:text-gray-500" x-text="formatPrice(product.originalPrice)"></span>
              </div>
            </div>
          </div>
        </a>
      </template>
    </div>

    <div x-show="!loading && totalPages > 1" class="mt-8 flex justify-center items-center gap-2">
      <button @click="goToPage(currentPage - 1)" :disabled="currentPage <= 1" class="px-4 py-2 border border-gray-300 rounded-lg disabled:opacity-50 hover:bg-gray-50 dark:bg-gray-800 dark:border-gray-600">
        <i class="fas fa-chevron-left"></i>
      </button>
      <template x-for="p in visiblePages" :key="p">
        <button @click="goToPage(p)" class="px-4 py-2 border rounded-lg" :class="p === currentPage ? 'bg-indigo-600 text-white border-indigo-600' : 'border-gray-300 hover:bg-gray-50 dark:bg-gray-800 dark:border-gray-600'" x-text="p"></button>
      </template>
      <button @click="goToPage(currentPage + 1)" :disabled="currentPage >= totalPages" class="px-4 py-2 border border-gray-300 rounded-lg disabled:opacity-50 hover:bg-gray-50 dark:bg-gray-800 dark:border-gray-600">
        <i class="fas fa-chevron-right"></i>
      </button>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-900 text-gray-400 py-8 mt-auto">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-sm">
      <p class="mb-4"><strong>联盟信息披露：</strong>本网站部分链接为联盟链接。详见 <a href="/affiliate-disclosure" class="text-indigo-400 hover:underline">联盟信息披露</a>。</p>
      <p>&copy; <span x-text="new Date().getFullYear()">2026</span> AI Shopping. AI驱动的全球商品推荐平台.</p>
    </div>
  </footer>

  <script>
  document.addEventListener('alpine:init', () => {
    Alpine.data('categoryPage', () => ({
      loading: true,
      products: [],
      totalProducts: 0,
      currentPage: 1,
      totalPages: 0,
      pageSize: 20,
      sortBy: 'latest',
      filterBrand: '',
      filterPlatform: '',
      priceMin: '',
      priceMax: '',
      categoryName: '',
      categorySlug: '',
      currentUrl: '',
      availableBrands: [],
      breadcrumbs: [],
      get visiblePages() {
        const pages = [];
        const start = Math.max(1, this.currentPage - 2);
        const end = Math.min(this.totalPages, start + 4);
        for (let i = start; i <= end; i++) pages.push(i);
        return pages;
      },
      async init() {
        const path = window.location.pathname;
        const catMatch = path.match(/\/category\/(.+)/);
        const brandMatch = path.match(/\/brand\/(.+)/);
        if (catMatch) {
          this.categorySlug = catMatch[1];
          this.categoryName = this.decodeCategoryName(this.categorySlug);
          this.breadcrumbs = [
            { name: '首页', url: '/' },
            { name: '分类', url: '/products' },
            { name: this.categoryName, url: '/category/' + this.categorySlug }
          ];
        } else if (brandMatch) {
          this.filterBrand = brandMatch[1];
          this.categoryName = this.decodeCategoryName(this.filterBrand);
          this.breadcrumbs = [
            { name: '首页', url: '/' },
            { name: '品牌', url: '/brands' },
            { name: this.categoryName, url: '/brand/' + this.filterBrand }
          ];
        } else {
          this.breadcrumbs = [
            { name: '首页', url: '/' },
            { name: '全部商品', url: '/products' }
          ];
        }
        this.currentUrl = window.location.href;
        await this.loadProducts();
        await this.loadBrands();
      },
      decodeCategoryName(slug) {
        return slug.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
      },
      async loadBrands() {
        try {
          const res = await fetch('/api/products?limit=1');
          if (res.ok) {
            const brands = [...new Set(this.products.map(p => p.brand).filter(Boolean))];
            this.availableBrands = brands;
          }
        } catch(e) { console.error(e); }
      },
      async loadProducts() {
        this.loading = true;
        try {
          let url = '/api/products?page=' + this.currentPage + '&limit=' + this.pageSize;
          if (this.categorySlug) url += '&category=' + this.categorySlug;
          if (this.filterBrand) url += '&brand=' + this.filterBrand;
          if (this.priceMin) url += '&price_min=' + this.priceMin;
          if (this.priceMax) url += '&price_max=' + this.priceMax;
          if (this.sortBy === 'price_asc') url += '&sort=price_asc';
          if (this.sortBy === 'price_desc') url += '&sort=price_desc';
          const res = await fetch(url);
          if (res.ok) {
            const data = await res.json();
            this.products = data.products || [];
            this.totalProducts = data.pagination?.total || 0;
            this.totalPages = data.pagination?.totalPages || 1;
            this.currentPage = data.pagination?.page || 1;
          }
        } catch(e) { console.error(e); }
        this.loading = false;
      },
      goToPage(page) {
        this.currentPage = page;
        this.loadProducts();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      },
      formatPrice(price) {
        if (!price) return '';
        return '$' + parseFloat(price).toFixed(2);
      }
    }));
  });
  </script>
</body>
</html>
