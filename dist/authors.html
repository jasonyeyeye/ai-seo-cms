<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>作者管理 - 管理后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-100">
  <div class="flex min-h-screen" x-data="authorsAdmin">
    {{ include('partials/admin-sidebar') }}

    <main class="flex-1 p-8">
      <div class="max-w-6xl mx-auto">
        <div class="flex items-center justify-between mb-8">
          <h1 class="text-3xl font-bold text-gray-900">👤 作者管理</h1>
          <button @click="showModal = true" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">+ 新建作者</button>
        </div>

        <!-- Authors Grid -->
        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
          <table class="w-full">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">作者</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Slug</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">简介</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">文章数</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">操作</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-200">
              <template x-for="author in authors" :key="author.id">
                <tr class="hover:bg-gray-50">
                  <td class="px-6 py-4">
                    <div class="flex items-center space-x-3">
                      <div class="w-10 h-10 bg-blue-100 rounded-full overflow-hidden flex items-center justify-center text-blue-600 font-bold" x-text="author.name.charAt(0)">
                      </div>
                      <div>
                        <a :href="'/authors/' + author.slug" target="_blank" class="font-medium text-gray-900 hover:text-blue-600" x-text="author.name"></a>
                        <div x-show="author.avatarUrl" class="text-xs text-gray-500">有头像</div>
                      </div>
                    </div>
                  </td>
                  <td class="px-6 py-4 text-gray-500 text-sm" x-text="author.slug"></td>
                  <td class="px-6 py-4 text-gray-500 text-sm truncate max-w-xs" x-text="author.bio || '-'"></td>
                  <td class="px-6 py-4 text-gray-500 text-sm" x-text="author.postCount || 0"></td>
                  <td class="px-6 py-4">
                    <div class="flex space-x-2">
                      <button @click="editAuthor(author)" class="text-blue-600 hover:underline text-sm">编辑</button>
                      <a :href="'/authors/' + author.slug" target="_blank" class="text-green-600 hover:underline text-sm">预览</a>
                      <button @click="deleteAuthor(author.id, author.name)" class="text-red-600 hover:underline text-sm">删除</button>
                    </div>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
          <div x-show="loading" class="text-center py-8 text-gray-500">加载中...</div>
          <div x-show="!loading && authors.length === 0" class="text-center py-8 text-gray-500">暂无作者</div>
        </div>
      </div>
    </main>

    <!-- Create/Edit Modal -->
    <div x-show="showModal" x-transition class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" style="display: none;">
      <div class="bg-white rounded-xl p-6 max-w-md w-full mx-4">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-xl font-bold" x-text="editingId ? '编辑作者' : '新建作者'"></h3>
          <button @click="closeModal" class="text-gray-500 hover:text-gray-700">✕</button>
        </div>
        <form @submit.prevent="saveAuthor" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">名称 *</label>
            <input type="text" x-model="form.name" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Slug</label>
            <input type="text" x-model="form.slug" placeholder="自动生成" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">简介</label>
            <textarea x-model="form.bio" rows="3" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">写作风格</label>
            <input type="text" x-model="form.styleTraits" placeholder="多个风格用逗号分隔" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">头像URL</label>
            <input type="url" x-model="form.avatarUrl" placeholder="https://..." class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
          <div class="flex space-x-3 pt-4">
            <button type="submit" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">保存</button>
            <button type="button" @click="closeModal" class="flex-1 px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200">取消</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('authorsAdmin', () => ({
        authors: [],
        loading: true,
        showModal: false,
        editingId: null,
        form: {
          name: '',
          slug: '',
          bio: '',
          styleTraits: '',
          avatarUrl: ''
        },

        async init() {
          await this.loadAuthors();
        },

        async loadAuthors() {
          this.loading = true;
          try {
            const res = await fetch('/api/authors');
            if (res.ok) {
              const data = await res.json();
              this.authors = data.authors || [];
            }
          } catch (e) {
            console.error('Failed to load authors:', e);
          } finally {
            this.loading = false;
          }
        },

        editAuthor(author) {
          this.editingId = author.id;
          this.form = {
            name: author.name,
            slug: author.slug,
            bio: author.bio || '',
            styleTraits: author.styleTraits || '',
            avatarUrl: author.avatarUrl || ''
          };
          this.showModal = true;
        },

        closeModal() {
          this.showModal = false;
          this.editingId = null;
          this.form = { name: '', slug: '', bio: '', styleTraits: '', avatarUrl: '' };
        },

        async saveAuthor() {
          try {
            const url = this.editingId
              ? '/api/authors/' + this.authors.find(a => a.id === this.editingId).slug
              : '/api/authors';
            const method = this.editingId ? 'PUT' : 'POST';

            const res = await fetch(url, {
              method,
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.form)
            });

            if (res.ok) {
              await this.loadAuthors();
              this.closeModal();
            } else {
              const err = await res.json();
              alert('保存失败: ' + err.error);
            }
          } catch (e) {
            console.error('Failed to save author:', e);
            alert('保存失败');
          }
        },

        async deleteAuthor(id, name) {
          if (!confirm('确定要删除作者 "' + name + '" 吗？')) return;
          try {
            const author = this.authors.find(a => a.id === id);
            const res = await fetch('/api/authors/' + author.slug, { method: 'DELETE' });
            if (res.ok) {
              await this.loadAuthors();
            } else {
              alert('删除失败');
            }
          } catch (e) {
            console.error('Failed to delete author:', e);
            alert('删除失败');
          }
        }
      }));
    });
  </script>
</body>
</html>
