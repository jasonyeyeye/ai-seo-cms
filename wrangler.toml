name = "ai-shopping-worker"
main = "src/worker/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
SITE_URL = "https://aibuylab.com"
SITE_TITLE = "AI Shopping"
BCRYPT_ROUNDS = "12"

account_id = "3e8c5385498b295ad3873e07c1b049e5"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "ai-shopping"
database_id = "f078849f-4d0e-4c2d-866c-5d9ee5d037b7"

# KV Namespaces
[[kv_namespaces]]
binding = "SEARCH_CACHE"
id = "9f58ddc751a8486c9c0bfe438f196379"

[[kv_namespaces]]
binding = "PRODUCT_CACHE"
id = "a18c0f0e41674ae48dc2d31db8a61ec2"

# R2 Bucket
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "aiseo"

# Environment variables (set via wrangler secret)
# TURNSTILE_SECRET_KEY
# MAILCHANNELS_API_KEY
# MAIL_FROM_EMAIL
# ADMIN_TOKEN